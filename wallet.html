<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer Wallet Lumio</title>

<style>
body{
font-family:system-ui;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#1c1c1c;
padding:30px;
border-radius:14px;
width:420px;
text-align:center;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#ff9800;
color:black;
font-weight:700;
cursor:pointer;
width:100%;
margin-top:15px;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

#msg{
margin-top:15px;
color:#aaa;
}
</style>
</head>

<body>

<div class="card">

<h2>Créer Wallet Créateur</h2>

<p>User ID</p>
<input id="uid" value="rkqWOOrUyxMHV0WEEeDxeX2AroL2" style="width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white">

<p>Stripe Account</p>
<input id="stripe" value="acct_1TAKKXDj8qdfl9hh" style="width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white">

<button onclick="createWallet()">Créer Wallet</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
authDomain:"lumio-822f0.firebaseapp.com",
databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
projectId:"lumio-822f0",
storageBucket:"lumio-822f0.firebasestorage.app",
messagingSenderId:"833325770824",
appId:"1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

window.createWallet = async () => {

const uid=document.getElementById("uid").value.trim();
const stripe=document.getElementById("stripe").value.trim();
const msg=document.getElementById("msg");

if(!uid || !stripe){
msg.innerText="Remplis les champs";
return;
}

msg.innerText="Vérification du wallet...";

const walletRef=ref(db,"wallets/"+uid);
const snap=await get(walletRef);

if(snap.exists()){

msg.innerText="⚠️ Wallet existe déjà";

console.log("wallet:",snap.val());

return;
}

/* CREATION WALLET */

await set(walletRef,{
totalEarned:0,
totalWithdrawn:0,
stripeAccountId:stripe,
createdAt:Date.now()
});

msg.innerText="✅ Wallet créé avec succès";

console.log("wallet créé");

}

</script>

</body>
</html>
