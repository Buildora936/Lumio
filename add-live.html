<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer un Live - Lumio Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:system-ui;
  color:white;
}
.container{
  max-width:800px;
  margin:40px auto;
  background:#181818;
  padding:30px;
  border-radius:16px;
}
h2{ margin-top:0; }

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button{
  background:#ff0000;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.progress-container{
  width:100%;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
  display:none;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#ff0000;
  transition:width 0.2s;
}

.progress-text{
  font-size:13px;
  color:#aaa;
  margin-bottom:15px;
}

.success{ color:#00ff88; margin-top:15px; }
.error{ color:#ff4444; margin-top:15px; }
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Créer un Live</h2>

  <input id="title" placeholder="Titre du live">
  <textarea id="description" rows="4" placeholder="Description du live"></textarea>
  <input type="file" id="thumbnailInput" accept="image/*">

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="progress-text" id="progressText"></div>

  <button id="createBtn">Créer le Live</button>

  <div id="message"></div>
</div>

<script type="module">

import { supabase } from "./supabase.js";

/* ================= STATE ================= */

let currentUser = null;

/* ================= AUTH ================= */

const { data, error } = await supabase.auth.getUser();

if (error || !data.user) {
  console.error("AUTH ERROR:", error);
  location.href = "login.html";
} else {
  currentUser = data.user;
}

console.log("USER:", currentUser);

/* ================= DOM ================= */

const createBtn = document.getElementById("createBtn");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const progressContainer = document.getElementById("progressContainer");
const message = document.getElementById("message");

/* ================= HELPERS ================= */

function updateProgress(p, text) {
  progressBar.style.width = p + "%";
  progressText.textContent = text;
}

/* ================= CREATE LIVE ================= */

createBtn.onclick = async () => {

  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const file = document.getElementById("thumbnailInput").files[0];

  if (!title || !file) {
    alert("Titre et miniature obligatoires");
    return;
  }

  createBtn.disabled = true;
  progressContainer.style.display = "block";

  try {

    /* ================= 1. UPLOAD IMAGE ================= */

    updateProgress(10, "Upload image...");

    const fileName = `live_${Date.now()}_${file.name}`;

    const { error: uploadError } = await supabase.storage
      .from("thumbnails")
      .upload(fileName, file);

    if (uploadError) throw uploadError;

    const { data: publicUrlData } = supabase.storage
      .from("thumbnails")
      .getPublicUrl(fileName);

    updateProgress(40, "Image OK");

    /* ================= 2. GET USER DATA ================= */

    updateProgress(55, "Récupération utilisateur...");

    const { data: userData, error: userError } = await supabase
      .from("users")
      .select("stripe_account_id, username")
      .eq("id", currentUser.id)
      .single();

    console.log("USER DATA:", userData, userError);

    if (userError || !userData) {
      throw new Error("Utilisateur introuvable en base");
    }

    const creatorStripeId = userData.stripe_account_id || null;
    const channelName = userData.username || "Créateur";

    /* ================= 3. CREATE LIVE ================= */

    updateProgress(75, "Création live...");

    const liveId = "live_" + Date.now();

    const { data: insertData, error: insertError } = await supabase
      .from("lives")
      .insert({
        id: liveId,

        title: title,
        description: description,
        thumbnail: publicUrlData.publicUrl,

        creator_id: currentUser.id,
        channel_name: channelName,

        creator_stripe_id: creatorStripeId,

        status: "waiting",

        // 🔥 FIX ICI (timestamp number au lieu de ISO)
        created_at: Date.now(),

        viewers: 0,
        total_support: 0,

        stream_key: "stream_" + Math.random().toString(36).substring(2),

        is_paid: false
      })
      .select();

    console.log("INSERT RESULT:", insertData, insertError);

    if (insertError) throw insertError;

    updateProgress(100, "Live créé");

    message.innerHTML = "<div class='success'>✅ Live créé avec succès</div>";

    setTimeout(() => {
      location.href = "live-control.html?id=" + liveId;
    }, 1200);

  } catch (err) {

    console.error("CREATE LIVE ERROR:", err);

    message.innerHTML = `<div class='error'>${err.message}</div>`;
    createBtn.disabled = false;
  }
};

</script>

</body>
</html>
