<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer un Live - Lumio Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:system-ui;
  color:white;
}
.container{
  max-width:800px;
  margin:40px auto;
  background:#181818;
  padding:30px;
  border-radius:16px;
}
h2{ margin-top:0; }

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button{
  background:#ff0000;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.progress-container{
  width:100%;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
  display:none;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#ff0000;
  transition:width 0.2s;
}

.progress-text{
  font-size:13px;
  color:#aaa;
  margin-bottom:15px;
}

.success{ color:#00ff88; margin-top:15px; }
.error{ color:#ff4444; margin-top:15px; }
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Créer un Live</h2>

  <input id="title" placeholder="Titre du live">
  <textarea id="description" rows="4" placeholder="Description du live"></textarea>
  <input type="file" id="thumbnailInput" accept="image/*">

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="progress-text" id="progressText"></div>

  <button id="createBtn">Créer le Live</button>

  <div id="message"></div>
</div>

<script type="module">

import { Room } from "https://cdn.skypack.dev/livekit-client";
import { supabase } from "./supabase.js";

/* ================= PARAMS ================= */

const params = new URLSearchParams(location.search);
const liveId = params.get("id");

console.log("LIVE ID:", liveId);

if (!liveId) location.href = "index.html";

/* ================= DOM ================= */

const video = document.getElementById("localVideo");
const viewersEl = document.getElementById("viewerCount");
const earnedEl = document.getElementById("totalEarned");
const topBox = document.getElementById("topSupporters");
const chatBox = document.getElementById("messages");

/* ================= STATE ================= */

let currentUser = null;
let localStream = null;
let room = null;
let lastMessageTime = 0;

/* ================= AUTH ================= */

const { data: { user }, error: authError } = await supabase.auth.getUser();

if (authError || !user){
  console.error("AUTH ERROR:", authError);
  location.href = "login.html";
}

currentUser = user;

console.log("USER ID:", currentUser.id);

/* ================= LIVE STATUS ================= */

async function setLiveStatus(status){

  console.log("Setting status:", status, "for live:", liveId);

  const { data, error } = await supabase
    .from("lives")
    .update({ status })
    .eq("id", liveId)
    .select();

  console.log("UPDATE RESULT:", data, error);

  if(error){
    alert("Erreur status: " + error.message);
  }
}

/* ================= LIVEKIT CONNECT ================= */

async function connectLiveKit(stream){

  console.log("CONNECTING TO LIVEKIT...");

  const roomName = liveId;

  const res = await fetch(
    "https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/livekit-token",
    {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        room: roomName,
        user: currentUser.id,
        isCreator: true
      })
    }
  );

  const { token } = await res.json();

  console.log("TOKEN RECEIVED");

  room = new Room();

  await room.connect(
    "wss://lumio-streaming-2k1h55ws.livekit.cloud",
    token
  );

  console.log("LIVEKIT CONNECTED");

  for (const track of stream.getTracks()) {
    await room.localParticipant.publishTrack(track);
  }

  console.log("TRACKS PUBLISHED");
}

/* ================= STREAM ================= */

async function startCamera(){

  console.log("START CAMERA CLICKED");

  try{

    localStream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    });

    video.srcObject = localStream;

    await connectLiveKit(localStream);

    await setLiveStatus("live");

  }catch(err){
    console.error("CAMERA ERROR:", err);
    alert("Erreur caméra");
  }
}

async function startScreen(){

  console.log("START SCREEN CLICKED");

  try{

    const screen = await navigator.mediaDevices.getDisplayMedia({ video:true });
    const mic = await navigator.mediaDevices.getUserMedia({ audio:true });

    screen.addTrack(mic.getAudioTracks()[0]);
    localStream = screen;

    video.srcObject = localStream;

    await connectLiveKit(localStream);

    await setLiveStatus("live");

  }catch(err){
    console.error("SCREEN ERROR:", err);
    alert("Erreur écran");
  }
}

camBtn.onclick = startCamera;
screenBtn.onclick = startScreen;

/* ================= PRESENCE ================= */

const presenceChannel = supabase.channel("live_" + liveId, {
  config:{
    presence:{ key: currentUser.id }
  }
});

presenceChannel.on("presence",{ event:"sync" },()=>{

  const state = presenceChannel.presenceState();
  const count = Object.keys(state).length;

  viewersEl.textContent = count + " spectateurs";

  supabase.from("lives")
    .update({ viewers: count })
    .eq("id", liveId);

});

await presenceChannel.subscribe(async (status)=>{
  if(status==="SUBSCRIBED"){
    await presenceChannel.track({
      user_id: currentUser.id,
      joined_at: Date.now()
    });
  }
});

/* ================= GAINS ================= */

const supportsChannel = supabase.channel("supports_" + liveId);

supportsChannel.on(
  "postgres_changes",
  {
    event:"*",
    schema:"public",
    table:"supports",
    filter:`live_id=eq.${liveId}`
  },
  ()=> loadSupports()
);

supportsChannel.subscribe();

async function loadSupports(){

  const { data } = await supabase
    .from("supports")
    .select("user_id, amount")
    .eq("live_id", liveId);

  let total = 0;
  const supporters = {};

  data?.forEach(s=>{
    total += Number(s.amount);
    supporters[s.user_id] =
      (supporters[s.user_id] || 0) + Number(s.amount);
  });

  earnedEl.textContent = "💰 $" + total.toFixed(2);

  const sorted = Object.entries(supporters)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3);

  topBox.innerHTML = "";

  const medals = ["🥇","🥈","🥉"];

  sorted.forEach((s,i)=>{
    const div = document.createElement("div");
    div.textContent = `${medals[i]} ${s[0]} — $${s[1]}`;
    topBox.appendChild(div);
  });
}

loadSupports();

/* ================= CHAT ================= */

const chatChannel = supabase.channel("chat_" + liveId);

chatChannel.on(
  "postgres_changes",
  {
    event:"INSERT",
    schema:"public",
    table:"chat_messages",
    filter:`live_id=eq.${liveId}`
  },
  (payload)=>{

    const m = payload.new;

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <b>${m.user_name}</b>: ${m.message}
      <span class="ban" onclick="ban('${m.user_id}')">Ban</span>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
);

chatChannel.subscribe();

/* ================= SEND MESSAGE ================= */

sendBtn.onclick = async ()=>{

  const now = Date.now();

  if(now - lastMessageTime < 1000){
    alert("Trop rapide");
    return;
  }

  const text = msgInput.value.trim();
  if(!text) return;

  msgInput.value="";
  lastMessageTime = now;

  await supabase.from("chat_messages").insert({
    live_id: liveId,
    user_id: currentUser.id,
    user_name: currentUser.user_metadata?.name || "Créateur",
    message: text,
    created_at: new Date().toISOString()
  });
};

/* ================= BAN ================= */

window.ban = async (uid)=>{
  await supabase.from("bans").insert({
    live_id: liveId,
    user_id: uid
  });
};

/* ================= END LIVE ================= */

window.endLive = async ()=>{

  await setLiveStatus("ended");

  localStream?.getTracks().forEach(t=>t.stop());

  if(room){
    await room.disconnect();
  }

  await presenceChannel.unsubscribe();

  alert("Live terminé");
  location.href="index.html";
};

</script>

</body>
</html>
