<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer un Live - Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:system-ui;
  color:white;
}

.container{
  max-width:800px;
  margin:40px auto;
  background:#181818;
  padding:30px;
  border-radius:16px;
}

h2{ margin-top:0; }

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:#ff0000;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:700;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.progress{
  width:100%;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
  display:none;
}

.bar{
  height:100%;
  width:0%;
  background:#ff0000;
}

.msg{
  margin-top:10px;
  font-size:14px;
}

.ok{ color:#00ff88; }
.err{ color:#ff4444; }
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Créer un Live</h2>

  <input id="title" placeholder="Titre du live">
  <textarea id="desc" placeholder="Description"></textarea>
  <input type="file" id="thumb" accept="image/*">

  <div class="progress" id="progress">
    <div class="bar" id="bar"></div>
  </div>

  <button id="btn">Créer le Live</button>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase,ref,set,get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* ================= INIT ================= */

const supabase = createClient(
 "https://ymcrkbcsuloijemdbqzy.supabase.co",
 "YOUR_SUPABASE_KEY"
);

const app = initializeApp({
 apiKey:"YOUR_FIREBASE_KEY",
 authDomain:"lumio-822f0.firebaseapp.com",
 databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId:"lumio-822f0"
});

const auth = getAuth(app);
const db = getDatabase(app);

/* ================= STATE ================= */

let user = null;
let creating = false;

/* ================= UI ================= */

const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const bar = document.getElementById("bar");
const progress = document.getElementById("progress");

/* ================= AUTH ================= */

onAuthStateChanged(auth, u=>{
  if(!u) location.href="login.html";
  user = u;
});

/* ================= CREATE ================= */

btn.onclick = async ()=>{

  if(creating) return;

  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const file = document.getElementById("thumb").files[0];

  if(!title || !file){
    msg.innerHTML="<span class='err'>Titre + image requis</span>";
    return;
  }

  creating = true;
  btn.disabled = true;
  progress.style.display = "block";

  try{

    /* ================= UPLOAD ================= */

    const fileName = "live_"+Date.now();

    const { error } = await supabase.storage
      .from("thumbnails")
      .upload(fileName, file);

    if(error) throw error;

    bar.style.width = "50%";

    const { data } = supabase.storage
      .from("thumbnails")
      .getPublicUrl(fileName);

    /* ================= GET USER STRIPE ================= */

    const snap = await get(ref(db, "users/" + user.uid));

    if(!snap.exists()){
      throw new Error("User introuvable");
    }

    const userData = snap.val();

    if(!userData.stripe_account_id){
      throw new Error("Stripe non configuré");
    }

    /* ================= CREATE LIVE ================= */

    const liveId = "live_" + Date.now();

    await set(ref(db, "lives/" + liveId), {
      id: liveId,
      title,
      description: desc,
      thumbnail: data.publicUrl,

      creatorId: user.uid,
      channelName: user.displayName || "Créateur",

      creatorStripeId: userData.stripe_account_id,

      status: "waiting",

      viewers: 0,
      totalSupport: 0,

      streamKey: "stream_" + Math.random().toString(36).slice(2),

      createdAt: Date.now()
    });

    bar.style.width = "100%";

    msg.innerHTML = "<span class='ok'>Live créé ✅</span>";

    setTimeout(()=>{
      location.href = "live-control.html?id=" + liveId;
    },1200);

  }catch(e){

    console.error(e);

    msg.innerHTML = "<span class='err'>"+e.message+"</span>";

    btn.disabled = false;
    creating = false;
    progress.style.display = "none";
  }
};
</script>

</body>
</html>
