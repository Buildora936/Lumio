<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer un Live - Lumio Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:system-ui;
  color:white;
}
.container{
  max-width:800px;
  margin:40px auto;
  background:#181818;
  padding:30px;
  border-radius:16px;
}
input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}
button{
  background:#ff0000;
  border:none;
  padding:12px;
  border-radius:8px;
  color:white;
  font-weight:600;
  cursor:pointer;
}
button:disabled{
  opacity:0.6;
}
.progress-container{
  width:100%;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  display:none;
}
.progress-bar{
  height:100%;
  width:0%;
  background:#ff0000;
}
.success{color:#00ff88;margin-top:10px;}
.error{color:#ff4444;margin-top:10px;}
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Créer un Live</h2>

  <input id="title" placeholder="Titre du live">
  <textarea id="description" placeholder="Description"></textarea>
  <input type="file" id="thumbnailInput" accept="image/*">

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <button id="createBtn">Créer le Live</button>
  <div id="message"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase,ref,set,get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* ================= INIT ================= */

const supabase=createClient(
 "https://ymcrkbcsuloijemdbqzy.supabase.co",
 "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

const app=initializeApp({
 apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
 authDomain:"lumio-822f0.firebaseapp.com",
 databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId:"lumio-822f0",
 storageBucket:"lumio-822f0.firebasestorage.app",
 messagingSenderId:"833325770824",
 appId:"1:833325770824:web:b1a87a7bda0b00ee20907d"
});

const auth=getAuth(app);
const db=getDatabase(app);

/* ================= STATE ================= */

let currentUser=null;
let creating=false;

/* ================= DOM ================= */

const btn=document.getElementById("createBtn");
const bar=document.getElementById("progressBar");
const box=document.getElementById("progressContainer");
const msg=document.getElementById("message");

/* ================= AUTH ================= */

onAuthStateChanged(auth,u=>{
 if(!u) location.href="login.html";
 currentUser=u;
});

/* ================= CREATE LIVE ================= */

btn.onclick=async()=>{

 if(creating) return; // 🔒 anti double clic

 const title=document.getElementById("title").value.trim();
 const desc=document.getElementById("description").value.trim();
 const file=document.getElementById("thumbnailInput").files[0];

 if(!title || !file){
   msg.innerHTML="<div class='error'>Titre + miniature requis</div>";
   return;
 }

 creating=true;
 btn.disabled=true;
 box.style.display="block";
 bar.style.width="10%";

 try{

  /* ================= GET STRIPE ================= */

  const userSnap=await get(ref(db,`users/${currentUser.uid}`));
  const userData=userSnap.val()||{};

  const creatorStripeId=userData.stripe_account_id || null;

  bar.style.width="30%";

  /* ================= UPLOAD ================= */

  const fileName=`live_${Date.now()}`;

  const {error}=await supabase.storage
    .from("thumbnails")
    .upload(fileName,file);

  if(error) throw new Error("Upload échoué");

  const {data:urlData}=supabase
    .storage
    .from("thumbnails")
    .getPublicUrl(fileName);

  bar.style.width="70%";

  /* ================= CREATE LIVE ================= */

  const liveId="live_"+Date.now();

  await set(ref(db,`lives/${liveId}`),{
    title,
    description:desc,
    thumbnail:urlData.publicUrl,

    creatorId:currentUser.uid,
    channelName:currentUser.displayName || "Créateur",
    creatorStripeId,

    status:"waiting",
    createdAt:Date.now(),

    // NEW MODEL
    viewers:0,
    totalSupport:0,
    streamKey:Math.random().toString(36).slice(2),
    isPaid:false
  });

  bar.style.width="100%";

  msg.innerHTML="<div class='success'>Live créé ✅</div>";

  setTimeout(()=>{
    location.href="live-control.html?id="+liveId;
  },1200);

 }catch(err){

  console.error(err);
  msg.innerHTML="<div class='error'>Erreur création</div>";

  btn.disabled=false;
  creating=false;
 }

};
</script>

</body>
</html>
