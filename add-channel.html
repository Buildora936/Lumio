<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer une chaîne – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:#181818;color:white;}
.container{max-width:480px;margin:60px auto;padding:25px;background:#0f0f0f;border-radius:16px;box-shadow:0 0 25px #000;}
h2{text-align:center;margin-bottom:20px;font-weight:700;color:#ff9800;}
input,select,textarea,button{width:100%;margin:10px 0;padding:12px;border-radius:12px;border:none;background:#1f1f1f;color:white;}
textarea{resize:none;}
button{background:#ff9800;color:black;font-weight:700;cursor:pointer;transition:.3s;}
button:hover{background:#e68a00;}
button:disabled{opacity:.5;cursor:not-allowed}
.error{color:#ff5555;text-align:center;font-size:14px}
.progress{height:18px;background:#222;border-radius:10px;overflow:hidden;margin:10px 0}
.bar{height:100%;width:0;background:#ff9800;transition:.4s}
</style>

<script type="module">

import { supabase } from "./supabase.js";

/* ================= STATE ================= */

let currentUser = null;

const bar = document.getElementById("bar");
const errorBox = document.getElementById("error");
const btn = document.getElementById("createBtn");

function progress(p){
  bar.style.width = p + "%";
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

/* ================= AUTH ================= */

const { data:{ user } } = await supabase.auth.getUser();

if(!user){
  location.href="login.html";
}

currentUser = user;

/* 🔒 vérifier si déjà une chaîne */

const { data: existingChannel } = await supabase
  .from("channels")
  .select("id")
  .eq("owner", user.id)
  .single();

if(existingChannel){
  alert("Tu as déjà une chaîne");
  location.href="studio.html";
}

/* ================= CREATE CHANNEL ================= */

window.createChannel = async (e)=>{
  e.preventDefault();

  errorBox.textContent="";
  btn.disabled = true;
  progress(5);

  const name = nameInput.value.trim();
  const desc = descInput.value.trim();
  const photo = photoInput.files[0];
  const banner = bannerInput.files[0];
  const cat = catInput.value;

  if(!name || !desc || !photo){
    errorBox.textContent="Remplis tous les champs";
    btn.disabled=false;
    return;
  }

  try{

    /* ================= IMAGES ================= */

    const photo64 = await toBase64(photo);
    const banner64 = banner ? await toBase64(banner) : null;

    progress(30);

    /* ================= STRIPE ================= */

    const stripeRes = await fetch(
      "https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-connected-account",
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ email: user.email })
      }
    );

    const stripeData = await stripeRes.json();

    if(!stripeData.account_id){
      throw new Error("Erreur Stripe");
    }

    const accountId = stripeData.account_id;
    const onboarding = stripeData.onboarding_url;

    progress(50);

    /* ================= INSERT CHANNEL ================= */

    const { data: channel, error } = await supabase
      .from("channels")
      .insert({
        name,
        description: desc,
        category: cat,

        owner: user.id,

        photo_url: photo64,
        banner_url: banner64,

        stripe_account_id: accountId,

        monetization: true,
        comments: true
      })
      .select()
      .single();

    if(error) throw error;

    progress(70);

    /* ================= WALLET ================= */

    await supabase.from("wallets").insert({
      user_id: user.id,
      stripe_account_id: accountId
    });

    /* ================= UPDATE USER ================= */

    await supabase
      .from("users")
      .update({
        stripe_account_id: accountId,
        stripe_onboarded: false
      })
      .eq("id", user.id);

    progress(100);

    alert("Chaîne créée !");

    window.location.href = onboarding;

  }catch(err){
    console.error(err);
    errorBox.textContent = err.message;
    btn.disabled=false;
  }
};

</script>
</head>

<body>

<div class="container">

<h2>Créer ta chaîne</h2>

<form onsubmit="createChannel(event)">

<input id="nameInput" placeholder="Nom chaîne">

<textarea id="descInput" placeholder="Description"></textarea>

<label>Photo</label>
<input id="photoInput" type="file" accept="image/*">

<label>Bannière</label>
<input id="bannerInput" type="file" accept="image/*">

<select id="catInput">
<option>Divers</option>
<option>Gaming</option>
<option>Musique</option>
<option>Education</option>
</select>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="error" class="error"></div>

<button id="createBtn">Créer la chaîne</button>

</form>

</div>

</body>
</html>
