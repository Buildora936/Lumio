<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer une chaîne – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:#181818;color:white;}
.container{max-width:480px;margin:60px auto;padding:25px;background:#0f0f0f;border-radius:16px;box-shadow:0 0 25px #000;}
h2{text-align:center;margin-bottom:20px;font-weight:700;color:#ff9800;}
input,select,textarea,button{width:100%;margin:10px 0;padding:12px;border-radius:12px;border:none;background:#1f1f1f;color:white;}
textarea{resize:none;}
button{background:#ff9800;color:black;font-weight:700;cursor:pointer;transition:.3s;}
button:hover{background:#e68a00;}
button:disabled{opacity:.5;cursor:not-allowed}
.error{color:#ff5555;text-align:center;font-size:14px}
.progress{height:18px;background:#222;border-radius:10px;overflow:hidden;margin:10px 0}
.bar{height:100%;width:0;background:#ff9800;transition:.4s}
</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, set, push, get, child } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const config={
 apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
 authDomain: "lumio-822f0.firebaseapp.com",
 databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId: "lumio-822f0",
 storageBucket: "lumio-822f0.firebasestorage.app",
 messagingSenderId: "833325770824",
 appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app=initializeApp(config);
const db=getDatabase(app);
const auth=getAuth(app);

let user=null;

const bar=()=>document.getElementById("bar");
const errBox=()=>document.getElementById("error");
const btn=()=>document.getElementById("createBtn");

function progress(p){bar().style.width=p+"%";}

function toBase64(file){
 return new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=()=>res(r.result);
  r.onerror=rej;
  r.readAsDataURL(file);
 });
}

onAuthStateChanged(auth,async u=>{
 if(!u){
  location.href="auth.html";
  return;
 }

 user=u;

 const snap=await get(child(ref(db),"userChannels/"+u.uid));

 if(snap.exists()){
  alert("Tu as déjà une chaîne.");
  location.href="studio.html";
 }
});

window.createChannel=async(e)=>{

 e.preventDefault();
 errBox().textContent="";
 btn().disabled=true;
 progress(5);

 if(!user){
  errBox().textContent="Utilisateur non connecté";
  btn().disabled=false;
  return;
 }

 const name=nameInput.value.trim();
 const desc=descInput.value.trim();
 const photo=photoInput.files[0];
 const banner=bannerInput.files[0];
 const cat=catInput.value;

 if(!name||!desc||!photo){
  errBox().textContent="Remplis tous les champs obligatoires.";
  btn().disabled=false;
  return;
 }

 try{

  const photo64=await toBase64(photo);
  const banner64=banner?await toBase64(banner):"";

  progress(30);

  /* CREATION COMPTE STRIPE */

  const stripeRes=await fetch(
  "https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-connected-account",
  {
   method:"POST",
   headers:{
    "Content-Type":"application/json"
   },
   body:JSON.stringify({
    email:user.email
   })
  });

  if(!stripeRes.ok){
   const txt=await stripeRes.text();
   throw new Error("Stripe API erreur : "+txt);
  }

  const stripeData=await stripeRes.json();

  const accountId=stripeData.account_id;
  const onboarding=stripeData.onboarding_url;

  if(!accountId)
   throw new Error("Stripe account non créé");

  progress(50);

  /* CREATION CHANNEL */

  const chRef=push(ref(db,"channels"));
  const id=chRef.key;

  await set(chRef,{
   id,
   name,
   description:desc,
   category:cat,
   owner:user.uid,
   photoURL:photo64,
   bannerURL:banner64,
   stripe_account_id:accountId,
   createdAt:Date.now(),
   monetization:true,
   comments:true
  });

  progress(70);

  await set(ref(db,"userChannels/"+user.uid),id);
  /* CREATION WALLET */

await set(ref(db,"wallets/"+user.uid),{
 totalEarned:0,
 totalWithdrawn:0,
 stripeAccountId:accountId,
 createdAt:Date.now()
});

  /* sauvegarde stripe dans user */

  
  await set(ref(db,"users/"+user.uid+"/stripe_account_id"),accountId);
  await set(ref(db,"users/"+user.uid+"/stripe_onboarded"),false);

  progress(100);

  alert("Chaîne créée ! Configure ton paiement Stripe.");

  /* redirection onboarding stripe */

  window.location.href=onboarding;

 }catch(err){

  console.error(err);
  errBox().textContent=err.message || "Erreur serveur";
  btn().disabled=false;

 }
};

</script>
</head>

<body>

<div class="container">

<h2>Créer ta chaîne</h2>

<form onsubmit="createChannel(event)">

<input id="nameInput" placeholder="Nom chaîne">

<textarea id="descInput" placeholder="Description"></textarea>

<label>Photo</label>
<input id="photoInput" type="file" accept="image/*">

<label>Bannière</label>
<input id="bannerInput" type="file" accept="image/*">

<select id="catInput">
<option>Divers</option>
<option>Gaming</option>
<option>Musique</option>
<option>Education</option>
</select>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="error" class="error"></div>

<button id="createBtn">Créer la chaîne</button>

</form>

</div>

</body>
</html>
