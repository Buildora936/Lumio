<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:#181818;
  color:white;
}
.container{
  max-width:480px;
  margin:40px auto;
  padding:20px;
  background:#0f0f0f;
  border-radius:14px;
  box-shadow:0 0 20px #000;
}
h2{text-align:center;margin-bottom:20px;}
input, select, button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1f1f1f;
  color:white;
}
button{
  background:#ff9800;
  color:black;
  font-weight:700;
  cursor:pointer;
}
button:hover{background:#e68a00;}
.error{color:#ff5555;text-align:center;font-size:14px;margin-top:8px;}
.progress-container{
  margin:20px 0;
  background:#202020;
  border-radius:10px;
  overflow:hidden;
  height:20px;
}
.progress-bar{
  height:100%;
  width:0%;
  background:#ff9800;
  transition:width 0.5s ease;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* 🔥 Firebase configuration */
const firebaseConfig = {
  apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain: "lumio-822f0.firebaseapp.com",
  databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId: "lumio-822f0",
  storageBucket: "lumio-822f0.firebasestorage.app",
  messagingSenderId: "833325770824",
  appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* Progress bar */
function updateProgress(p){
  document.getElementById("progressBar").style.width = p+"%";
}

window.onload = ()=>{
  const form = document.getElementById("signupForm");
  const errorBox = document.getElementById("error");

  form.onsubmit = async (e)=>{
    e.preventDefault();
    errorBox.textContent="";
    updateProgress(10);

    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    const confirm = document.getElementById("confirmInput").value;
    const username = document.getElementById("usernameInput").value.trim().toLowerCase();
    const birthdate = document.getElementById("birthInput").value;
    const country = document.getElementById("countryInput").value;

    if(password !== confirm) return errorBox.textContent="Mots de passe différents";
    if(password.length < 8) return errorBox.textContent="Mot de passe trop court";

    updateProgress(25);

    try{
      /* Vérifier username unique */
      const snap = await get(ref(db,"usernames/"+username));
      if(snap.exists()) return errorBox.textContent="Nom déjà pris";

      /* Création utilisateur Firebase */
      const cred = await createUserWithEmailAndPassword(auth,email,password);
      const uid = cred.user.uid;

      updateProgress(60);

      /* Sauvegarde utilisateur */
      await set(ref(db,"users/"+uid),{
        email,
        username,
        birthdate,
        country,
        role:"user",
        createdAt: Date.now()
      });

      await set(ref(db,"usernames/"+username),uid);

      updateProgress(100);

      /* Redirection vers le dashboard */
      window.location.href = "index.html";

    }catch(err){
      console.error(err);
      errorBox.textContent = err.message;
    }
  };
};
</script>
</head>

<body>
<div class="container">
<h2>Créer un compte Lumio</h2>

<form id="signupForm">

<input id="emailInput" type="email" placeholder="Email" required>
<input id="passwordInput" type="password" placeholder="Mot de passe" required>
<input id="confirmInput" type="password" placeholder="Confirmer mot de passe" required>
<input id="usernameInput" placeholder="Nom d’utilisateur public" required>

<label>Date de naissance</label>
<input id="birthInput" type="date" required>

<select id="countryInput" required>
<option value="">Pays</option>
<option value="HT">Haïti</option>
<option value="FR">France</option>
<option value="US">États-Unis</option>
<option value="+">autre</option>
</select>

<div class="progress-container">
<div id="progressBar" class="progress-bar"></div>
</div>

<div class="error" id="error"></div>
<button type="submit">Créer le compte</button>

</form>
</div>
</body>
</html>
