<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<title>Publier un produit – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
margin:0;
font-family:system-ui;
background:#181818;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

main{
width:95%;
max-width:700px;
background:#202020;
padding:40px;
border-radius:20px;
text-align:center;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:#2a2a2a;
padding:30px;
border-radius:16px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.05);
background:#333;
}

.icon{
font-size:40px;
margin-bottom:10px;
}

.title{
font-weight:700;
font-size:18px;
}

.desc{
font-size:13px;
color:#aaa;
margin-top:6px;
}

</style></head><body><main><h1>Publier un produit</h1><div class="grid"><div class="card" onclick="go('add-book.html')">
<div class="icon">📚</div>
<div class="title">Livre</div>
<div class="desc">Roman, guide, ebook...</div>
</div><div class="card" onclick="go('add-music.html')">
<div class="icon">🎵</div>
<div class="title">Musique</div>
<div class="desc">Audio ou clip vidéo</div>
</div><div class="card" onclick="go('add-art.html')">
<div class="icon">🎨</div>
<div class="title">Art</div>
<div class="desc">Illustration, photo, design</div>
</div></div></main><script>

function go(page){
location.href=page
}

</script></body>
</html>
