<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Retrait – Lumio Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:system-ui}
header{padding:20px;font-size:22px;font-weight:600;text-align:center}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:16px}
.card{background:#1c1c1c;border-radius:12px;padding:16px;margin:16px}
.card span{font-size:12px;color:#aaa}
.card h2{margin:4px 0 0}
button{background:#ff9800;color:black;padding:14px;border:none;border-radius:12px;font-weight:700;cursor:pointer;width:100%}
button:disabled{opacity:0.6;cursor:not-allowed}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:10px;border-bottom:1px solid #333;font-size:13px;color:white}
th{color:#aaa}
</style>
</head>

<body>
<header>Retrait – Lumio Studio</header>

<div class="stats">
  <div class="card"><span>Solde disponible</span><h2 id="balance">$0</h2></div>
  <div class="card"><span>Total gagné</span><h2 id="earned">$0</h2></div>
  <div class="card"><span>Total retiré</span><h2 id="withdrawn">$0</h2></div>
</div>

<div class="card">
  <button id="payoutBtn">Demander un retrait</button>
</div>

<div class="card">
  <h3>Historique des demandes</h3>
  <table>
    <thead>
      <tr><th>Date</th><th>Montant</th><th>Statut</th></tr>
  </thead>
  <tbody id="payoutHistory"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase, ref, get, push, set, update } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain: "lumio-822f0.firebaseapp.com",
  databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId: "lumio-822f0",
  storageBucket: "lumio-822f0.firebasestorage.app",
  messagingSenderId: "833325770824",
  appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
const balanceEl = document.getElementById("balance");
const earnedEl = document.getElementById("earned");
const withdrawnEl = document.getElementById("withdrawn");
const payoutBtn = document.getElementById("payoutBtn");
const payoutHistoryEl = document.getElementById("payoutHistory");

onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";
  currentUser = user;
  await loadWallet();
  await loadHistory();
});

async function loadWallet(){
  const walletRef = ref(db, "wallets/"+currentUser.uid);
  const snap = await get(walletRef);
  let wallet = { totalEarned:0, totalWithdrawn:0, stripeAccountId: "" };
  if(snap.exists()) wallet = snap.val();

  const available = (wallet.totalEarned*0.8) - wallet.totalWithdrawn;
  balanceEl.textContent = "$"+available.toFixed(2);
  earnedEl.textContent = "$"+wallet.totalEarned.toFixed(2);
  withdrawnEl.textContent = "$"+wallet.totalWithdrawn.toFixed(2);

  // Check 28 days cooldown
  const histSnap = await get(ref(db,"payoutRequests/"+currentUser.uid));
  if(histSnap.exists()){
    const requests = Object.values(histSnap.val()).sort((a,b)=>b.date-a.date);
    const lastReq = requests[0];
    const now = Date.now();
    if(lastReq && (now - lastReq.date < 28*24*3600*1000)) {
      payoutBtn.disabled = true;
      payoutBtn.innerText = "Retrait disponible dans 28 jours";
    }
  }
}

async function loadHistory(){
  const histRef = ref(db,"payoutRequests/"+currentUser.uid);
  const snap = await get(histRef);
  payoutHistoryEl.innerHTML="";
  if(snap.exists()){
    Object.values(snap.val()).sort((a,b)=>b.date-a.date).forEach(req=>{
      const row = document.createElement("tr");
      row.innerHTML = `<td>${new Date(req.date).toLocaleDateString()}</td>
                       <td>$${req.amount.toFixed(2)}</td>
                       <td>${req.status}</td>`;
      payoutHistoryEl.appendChild(row);
    });
  }
}

// 💳 Retrait via Stripe Connect
async function requestPayout(){
  payoutBtn.disabled = true;
  payoutBtn.innerText = "Traitement...";

  try{
    const walletRef = ref(db,"wallets/"+currentUser.uid);
    const snap = await get(walletRef);
    if(!snap.exists()) throw new Error("Wallet inexistant");
    const wallet = snap.val();
    const available = (wallet.totalEarned*0.8) - wallet.totalWithdrawn;
    if(available < 10) throw new Error("Solde insuffisant (min 10$)");

    // 🔹 Créer PaymentIntent via API côté serveur
    const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-payment-intent", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        amount: Math.floor(available*100),  // cents
        currency:"usd",
        stripeAccount: wallet.stripeAccountId,
        description:"Retrait Lumio",
        transfer_data: { destination: wallet.stripeAccountId }
      })
    });
    const data = await res.json();
    if(!data.success) throw new Error(data.message||"Erreur Stripe");

    // ✅ Enregistrer la demande après confirmation
    const reqRef = push(ref(db,"payoutRequests/"+currentUser.uid));
    await set(reqRef,{
      amount: available,
      date: Date.now(),
      status: "pending",
      stripePaymentIntent: data.paymentIntentId
    });

    // Déduire le solde
    await update(walletRef,{ totalWithdrawn: (wallet.totalWithdrawn||0)+available });

    alert("Demande de retrait créée avec succès !");
    location.reload();

  }catch(err){
    alert(err.message);
    payoutBtn.disabled=false;
    payoutBtn.innerText="Demander un retrait";
  }
}

payoutBtn.onclick = requestPayout;
</script>
</body>
</html>
