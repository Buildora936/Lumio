<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Checkout</title>

<script src="https://js.stripe.com/v3/"></script>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:400px;
background:#1c1c1c;
padding:25px;
border-radius:12px;
}

img{
width:100%;
border-radius:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
background:orange;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#payment-element{
margin-top:15px;
}

.success{
display:none;
text-align:center;
}

.download{
background:#00c853;
}

</style>
</head>

<body>

<div class="container">

<div id="checkout">

<h2>Paiement</h2>

<img id="productImage">

<h3 id="productTitle"></h3>

<p id="productPrice"></p>

<form id="payment-form">

<div id="payment-element"></div>

<button id="submit">Payer</button>

</form>

</div>

<div class="success" id="success">

<h2>Paiement réussi 🎉</h2>

<p>Produit ajouté à votre bibliothèque</p>

<a id="downloadLink">
<button class="download">Télécharger</button>
</a>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"
import { getDatabase, ref, get, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const firebaseConfig = {

apiKey: "AIza...",
authDomain: "app.firebaseapp.com",
databaseURL: "https://app.firebaseio.com",
projectId: "app",

}

const app = initializeApp(firebaseConfig)

const db = getDatabase(app)

const auth = getAuth()

/* STRIPE */

const stripe = Stripe("pk_test_51T5dLtDvG1O1eTGy2yb8ADAX15shxntgDaS31pjExCuVEDoAfc4O3Fet70rVdM7az2HhAcv3qrr4WQF2m0QDgoJW00rtDoDjdA")

let elements
let clientSecret
let product
let creatorStripe

/* GET PRODUCT ID */

const params = new URLSearchParams(window.location.search)

const productId = params.get("id")
const type = params.get("type")

/* LOAD PRODUCT */

async function loadProduct(){

const snap = await get(ref(db,"products/"+productId))

product = snap.val()

document.getElementById("productImage").src = product.image

document.getElementById("productTitle").innerText = product.title

document.getElementById("productPrice").innerText = "$"+product.price

/* GET CREATOR STRIPE */

const ch = await get(ref(db,"channels/"+product.creator))

creatorStripe = ch.val().stripe_account_id

createPaymentIntent()

}

loadProduct()

/* CREATE PAYMENT */

async function createPaymentIntent(){

const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent", {
 method:"POST",
 headers:{
  "Content-Type":"application/json"
 },
 body:JSON.stringify({

  price:product.price,
  productId:product.id,
  creatorId:product.owner,
  userId:user.uid,
  title:product.title,
  downloadURL:product.downloadURL,
  stripeAccount:product.stripe_account_id

 })
})

const data = await res.json()

clientSecret = data.clientSecret

elements = stripe.elements({clientSecret})

const paymentElement = elements.create("payment")

paymentElement.mount("#payment-element")

}

/* SUBMIT PAYMENT */

const form = document.getElementById("payment-form")

form.addEventListener("submit", async(e)=>{

e.preventDefault()

const {error} = await stripe.confirmPayment({

elements,

confirmParams:{
return_url:window.location.href
}

})

if(error){

alert(error.message)

}

})

/* CHECK SUCCESS */

const url = new URL(window.location)

if(url.searchParams.get("payment_intent_client_secret")){

checkPayment()

}

async function checkPayment(){

const clientSecret = url.searchParams.get("payment_intent_client_secret")

const {paymentIntent} = await stripe.retrievePaymentIntent(clientSecret)

if(paymentIntent.status==="succeeded"){

savePurchase()

}

}

/* SAVE PURCHASE */

async function savePurchase(){

const user = auth.currentUser

const purchaseRef = push(ref(db,"purchases"))

await set(purchaseRef,{

user:user.uid,

productId:productId,

price:product.price,

date:Date.now()

})

await set(ref(db,"userLibrary/"+user.uid+"/"+productId),{

title:product.title,

download:product.file,

image:product.image

})

document.getElementById("checkout").style.display="none"

document.getElementById("success").style.display="block"

document.getElementById("downloadLink").href = product.file

}

</script>

</body>
</html>
