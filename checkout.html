<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Checkout</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.container{
  width:400px;
  background:#1c1c1c;
  padding:25px;
  border-radius:12px;
}
img{
  width:100%;
  border-radius:8px;
  margin-bottom:10px;
}
button{
  width:100%;
  padding:14px;
  border:none;
  background:orange;
  color:white;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}
#payment-element{
  margin-top:15px;
}
.success{
  display:none;
  text-align:center;
}
.download{
  background:#00c853;
}
</style>
</head>

<body>

<div class="container">

<div id="checkout">

<h2>Paiement</h2>

<img id="productImage">

<h3 id="productTitle"></h3>

<p id="productPrice"></p>

<form id="payment-form">

<div id="payment-element"></div>

<button id="submit" disabled>Payer</button>

</form>

</div>

<div class="success" id="success">

<h2>Paiement réussi 🎉</h2>

<p>Produit ajouté à votre bibliothèque</p>

<a id="downloadLink">
<button class="download">Télécharger</button>
</a>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"
import { getDatabase, ref, get, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const firebaseConfig = {
apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
authDomain: "lumio-822f0.firebaseapp.com",
databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
projectId: "lumio-822f0",
storageBucket: "lumio-822f0.firebasestorage.app",
messagingSenderId: "833325770824",
appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)
const auth = getAuth(app)

/* STRIPE */
const stripe = Stripe("pk_test_51T5dLtDvG1O1eTGy2yb8ADAX15shxntgDaS31pjExCuVEDoAfc4O3Fet70rVdM7az2HhAcv3qrr4WQF2m0QDgoJW00rtDoDjdA")

let elements
let product
let user

const submitBtn = document.getElementById("submit")

/* PARAMS */
const params = new URLSearchParams(window.location.search)
const productId = params.get("id")

/* AUTH */
onAuthStateChanged(auth, async(u)=>{
if(!u){ location.href="auth.html"; return }
user = u
loadProduct()
})

/* LOAD PRODUCT */
async function loadProduct(){

const snap = await get(ref(db,"arts/"+productId))

if(!snap.exists()){
alert("Produit introuvable")
return
}

product = snap.val()

document.getElementById("productImage").src = product.cover1URL
document.getElementById("productTitle").innerText = product.title
document.getElementById("productPrice").innerText = "$"+product.price

await createPaymentIntent()

}

/* CREATE PAYMENT */
async function createPaymentIntent(){

try{

submitBtn.disabled = true

const res = await fetch(
"https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent",
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
price:product.price,
productId,
creatorId:product.creatorChannelId,
userId:user.uid,
title:product.title,
downloadURL:product.artURL,
stripeAccount:product.stripe_account_id
})
})

const data = await res.json()
console.log("Stripe response:",data)

if(!data.clientSecret){
throw new Error("clientSecret manquant")
}

elements = stripe.elements({
clientSecret: data.clientSecret
})

const paymentElement = elements.create("payment")
paymentElement.mount("#payment-element")

submitBtn.disabled = false

}catch(err){

alert("Erreur Stripe/API : "+err.message)

}

}

/* SUBMIT */
document.getElementById("payment-form").addEventListener("submit", async(e)=>{

e.preventDefault()

if(!elements){
alert("Stripe pas prêt")
return
}

submitBtn.disabled = true

try{

const {error, paymentIntent} = await stripe.confirmPayment({
elements,
redirect:"if_required"
})

if(error){
alert(error.message)
submitBtn.disabled = false
return
}

if(paymentIntent && paymentIntent.status==="succeeded"){
await savePurchase()
}else{
alert("Paiement échoué : "+paymentIntent.status)
submitBtn.disabled = false
}

}catch(err){
alert("Erreur paiement : "+err.message)
submitBtn.disabled = false
}

})

/* SAVE */
async function savePurchase(){

const purchaseRef = push(ref(db,"purchases"))

await set(purchaseRef,{
user:user.uid,
productId,
price:product.price,
date:Date.now()
})

await set(ref(db,"userLibrary/"+user.uid+"/"+productId),{
title:product.title,
download:product.artURL,
image:product.cover1URL
})

document.getElementById("checkout").style.display="none"
document.getElementById("success").style.display="block"

document.getElementById("downloadLink").href = product.artURL

}

</script>

</body>
</html>
