<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumio Shop</title><style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui;
color:white;

background:linear-gradient(270deg,#0f0f0f,#1c1c1c,#111);
background-size:600% 600%;
animation:bgMove 14s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

header{
padding:30px;
text-align:center;
}

h1{
margin:0;
font-size:34px;
}

.search{
margin-top:20px;
}

.search input{
width:280px;
padding:12px;
border-radius:10px;
border:none;
background:#222;
color:white;
}

main{
padding:40px;
max-width:1200px;
margin:auto;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:24px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:12px;
}

.title{
font-weight:700;
font-size:16px;
}

.creator{
font-size:13px;
color:#aaa;
margin-top:4px;
}

.price{
color:#ff7a18;
font-weight:700;
margin-top:6px;
}

.badge{
font-size:11px;
background:#333;
display:inline-block;
padding:3px 8px;
border-radius:6px;
margin-top:6px;
}

</style></head><body><header><h1>Lumio Shop</h1><div class="search">
<input id="search" placeholder="Rechercher..." oninput="filterProducts()">
</div></header><main><div class="products" id="products"></div></main><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
databaseURL:"https://lumio-default-rtdb.firebaseio.com/"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

let allProducts=[]

async function loadProducts(){

const booksSnap=await get(ref(db,"books"))
const musicSnap=await get(ref(db,"music"))
const artsSnap=await get(ref(db,"arts"))

let products=[]

if(booksSnap.exists()){

Object.entries(booksSnap.val()).forEach(([id,data])=>{

products.push({
...data,
id:id,
type:"book"
})

})

}

if(musicSnap.exists()){

Object.entries(musicSnap.val()).forEach(([id,data])=>{

products.push({
...data,
id:id,
type:"music"
})

})

}

if(artsSnap.exists()){

Object.entries(artsSnap.val()).forEach(([id,data])=>{

products.push({
...data,
id:id,
type:"art"
})

})

}

allProducts=rankProducts(products)

displayProducts(allProducts)

}


function rankProducts(products){

return products.sort((a,b)=>{

const scoreA=(a.views||0)*0.3+(a.sales||0)*0.7
const scoreB=(b.views||0)*0.3+(b.sales||0)*0.7

return scoreB-scoreA

})

}


function displayProducts(list){

const container=document.getElementById("products")

container.innerHTML=""

list.forEach(p=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.cover1URL || p.coverURL || ''}">

<div class="info">

<div class="title">${p.title || "Sans titre"}</div>

<div class="creator">${p.creatorName || ""}</div>

<div class="price">$${p.price || 0}</div>

<div class="badge">${p.type}</div>

</div>

`

card.onclick=()=>{

location.href=`product-detail.html?id=${p.id}&type=${p.type}`

}

container.appendChild(card)

})

}


function filterProducts(){

const q=document.getElementById("search").value.toLowerCase()

const filtered=allProducts.filter(p=>

(p.title||"").toLowerCase().includes(q) ||
(p.creatorName||"").toLowerCase().includes(q)

)

displayProducts(filtered)

}


loadProducts()

</script></body>
</html>
