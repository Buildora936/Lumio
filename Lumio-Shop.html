<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
  margin:0;
  font-family:system-ui;
  color:white;
  background: radial-gradient(circle at 50% 50%, #ff6a00, #ffb347, #ff8c00, #ff4500);
  background-size: 400% 400%;
  animation: epicBg 20s ease infinite;
  overflow-x:hidden;
}

@keyframes epicBg{
  0%{background-position:0% 50%}
  25%{background-position:50% 0%}
  50%{background-position:100% 50%}
  75%{background-position:50% 100%}
  100%{background-position:0% 50%}
}

header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
  position: sticky;
  top:0;
  z-index:100;
}

header h1{
  margin:0;
  font-size:28px;
  color:#fff;
  text-shadow:2px 2px 6px #000;
}

.search-bar{
  max-width:500px;
  margin:20px auto;
  display:flex;
  gap:8px;
}

.search-bar input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  background:rgba(0,0,0,0.2);
  color:white;
}

.search-bar button{
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#fff;
  color:#ff6a00;
  font-weight:700;
  cursor:pointer;
}

.categories{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px 0;
  flex-wrap:wrap;
}

.categories button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.2);
  color:white;
  cursor:pointer;
  transition:.2s;
}

.categories button:hover{
  background:#fff;
  color:#ff6a00;
  font-weight:700;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:22px;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(6px);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  display:flex;
  flex-direction:column;
  position: relative;
}

.card::after{
  content:"";
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:radial-gradient(circle, rgba(255,140,0,0.1), transparent 70%);
  opacity:0.7;
  pointer-events:none;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{
  padding:12px;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.title{
  font-weight:700;
  font-size:16px;
  margin-bottom:6px;
}

.creator{
  color:#fff;
  font-size:13px;
  margin-bottom:6px;
}

.price{
  color:#ffb347;
  font-weight:700;
  margin-bottom:6px;
}

.more{
  margin-top:auto;
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#ffb347;
  color:black;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.more:hover{
  background:#ff9500;
}

.section-title{
  margin:30px 20px 10px;
  font-size:20px;
  color:white;
}

</style>
</head>

<body>

<header>
<h1>Lumio Shop</h1>

<div class="search-bar">
 <input type="text" id="searchInput" placeholder="Rechercher un produit...">
 <button id="searchBtn"><i class="fa fa-search"></i></button>
</div>
</header>

<div class="categories">
 <button data-type="all">Tous</button>
 <button data-type="book">Livres</button>
 <button data-type="music">Musique</button>
 <button data-type="art">Art</button>
</div>

<h2 class="section-title">Nouveautés</h2>
<div class="products" id="products"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig={
 apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
 authDomain: "lumio-822f0.firebaseapp.com",
 databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId: "lumio-822f0",
 storageBucket: "lumio-822f0.firebasestorage.app",
 messagingSenderId: "833325770824",
 appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let ALL_PRODUCTS = [];

/* =========================
   LOAD PRODUCTS
========================= */

async function loadProducts(){

 const [booksSnap,musicSnap,artsSnap] = await Promise.all([
   get(ref(db,"books")),
   get(ref(db,"music")),
   get(ref(db,"arts"))
 ]);

 let products = [];

 if(booksSnap.exists())
 Object.entries(booksSnap.val()).forEach(([id,data])=>
 products.push({...data,id,type:"book"}));

 if(musicSnap.exists())
 Object.entries(musicSnap.val()).forEach(([id,data])=>
 products.push({...data,id,type:"music"}));

 if(artsSnap.exists())
 Object.entries(artsSnap.val()).forEach(([id,data])=>
 products.push({...data,id,type:"art"}));

 ALL_PRODUCTS = rankProducts(products);
 displayProducts(ALL_PRODUCTS);
}

/* =========================
   RANKING (simple trending)
========================= */

function rankProducts(products){
 return products.sort((a,b)=>{
   const scoreA = (a.views||0)*0.3 + (a.sales||0)*0.7;
   const scoreB = (b.views||0)*0.3 + (b.sales||0)*0.7;
   return scoreB - scoreA;
 });
}

/* =========================
   DISPLAY
========================= */

function displayProducts(list){

 const container = document.getElementById("products");
 container.innerHTML = "";

 list.forEach(p=>{

 const card = document.createElement("div");
 card.className = "card";

 card.innerHTML = `
   <img src="${p.cover1URL || p.coverURL || 'https://via.placeholder.com/220x180'}">
   <div class="info">
     <div class="title">${p.title}</div>
     <div class="creator">${p.creatorName || "Anonyme"}</div>
     <div class="price">$${p.price || 0}</div>
     <button class="more">Voir plus</button>
   </div>
 `;

 card.querySelector(".more").onclick = () => {
   location.href = `product-detail.html?id=${p.id}&type=${p.type}`;
 };

 container.appendChild(card);

 });

}

/* =========================
   SEARCH
========================= */

function search(query){

 query = query.toLowerCase();

 const filtered = ALL_PRODUCTS.filter(p =>
   (p.title||"").toLowerCase().includes(query) ||
   (p.creatorName||"").toLowerCase().includes(query)
 );

 displayProducts(filtered);
}

document.getElementById("searchBtn").onclick = () => {
 const q = document.getElementById("searchInput").value;
 search(q);
};

/* =========================
   CATEGORY FILTER
========================= */

document.querySelectorAll(".categories button").forEach(btn=>{
 btn.onclick = () => {
   const type = btn.dataset.type;
   if(type === "all") return displayProducts(ALL_PRODUCTS);

   const filtered = ALL_PRODUCTS.filter(p => p.type === type);
   displayProducts(filtered);
 };
});

/* =========================
   INIT
========================= */

loadProducts();

</script>

</body>
</html>
