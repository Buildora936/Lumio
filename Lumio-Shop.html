<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =========================
   BACKGROUND NOIR + PARTICULES ORANGE
========================= */

body{
  margin:0;
  font-family:system-ui;
  color:white;
  background:#0b0b0b;
  overflow-x:hidden;
}

/* canvas particules */
#particles{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* =========================
   HEADER
========================= */

header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position: sticky;
  top:0;
  z-index:100;
}

header h1{
  margin:0;
  font-size:28px;
  color:#fff;
}

/* =========================
   SEARCH
========================= */

.search-bar{
  max-width:500px;
  margin:20px auto;
  display:flex;
  gap:8px;
}

.search-bar input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.search-bar button{
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#ff7a18;
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* =========================
   CATEGORIES (SIMPLIFIÉES VISUELLEMENT)
========================= */

.categories{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:20px 0;
  flex-wrap:wrap;
}

.categories button{
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:#151515;
  color:white;
  cursor:pointer;
  border:1px solid #222;
}

.categories button:hover{
  background:#ff7a18;
  color:black;
}

/* =========================
   GRID
========================= */

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:22px;
  padding:0 20px;
}

/* =========================
   CARD
========================= */

.card{
  background:#141414;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
  display:flex;
  flex-direction:column;
  border:1px solid #1f1f1f;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#ff7a18;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{
  padding:12px;
  display:flex;
  flex-direction:column;
}

.title{
  font-weight:700;
  font-size:16px;
  margin-bottom:6px;
}

.creator{
  font-size:13px;
  opacity:0.7;
}

.price{
  color:#ffb347;
  font-weight:700;
  margin-top:6px;
}

.more{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#ff7a18;
  color:black;
  font-weight:700;
  cursor:pointer;
}

/* =========================
   PARTICULES ORANGE
========================= */

.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:#ff7a18;
  border-radius:50%;
  opacity:0.6;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh); opacity:0}
  10%{opacity:0.8}
  to{transform:translateY(-10vh); opacity:0}
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
<h1>Lumio Shop</h1>

<div class="search-bar">
 <input type="text" id="searchInput" placeholder="Rechercher un produit...">
 <button id="searchBtn"><i class="fa fa-search"></i></button>
</div>
</header>

<div class="categories">
 <button data-type="all">Tous</button>
 <button data-type="book">Livres</button>
 <button data-type="music">Musique</button>
 <button data-type="art">Art</button>
</div>

<div class="products" id="products"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig={
 apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
 authDomain: "lumio-822f0.firebaseapp.com",
 databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId: "lumio-822f0",
 storageBucket: "lumio-822f0.firebasestorage.app",
 messagingSenderId: "833325770824",
 appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let ALL_PRODUCTS = [];

/* =========================
   FIREBASE LOAD
========================= */

async function loadProducts(){

 const [booksSnap,musicSnap,artsSnap] = await Promise.all([
   get(ref(db,"books")),
   get(ref(db,"music")),
   get(ref(db,"arts"))
 ]);

 let products = [];

 if(booksSnap.exists())
 Object.entries(booksSnap.val()).forEach(([id,data])=>
 products.push({...data,id,type:"book"}));

 if(musicSnap.exists())
 Object.entries(musicSnap.val()).forEach(([id,data])=>
 products.push({...data,id,type:"music"}));

 if(artsSnap.exists())
 Object.entries(artsSnap.val()).forEach(([id,data])=>
 products.push({...data,id,type:"art"}));

 ALL_PRODUCTS = products;
 displayProducts(ALL_PRODUCTS);
}

/* =========================
   DISPLAY
========================= */

function displayProducts(list){

 const container = document.getElementById("products");
 container.innerHTML = "";

 list.forEach(p=>{

 const card = document.createElement("div");
 card.className = "card";

 card.innerHTML = `
   <img src="${p.cover1URL || p.coverURL || 'https://via.placeholder.com/220x180'}">
   <div class="info">
     <div class="title">${p.title}</div>
     <div class="creator">${p.creatorName || "Anonyme"}</div>
     <div class="price">$${p.price || 0}</div>
     <button class="more">Voir plus</button>
   </div>
 `;

 card.querySelector(".more").onclick = () => {
   location.href = `product-detail.html?id=${p.id}&type=${p.type}`;
 };

 container.appendChild(card);

 });

}

/* =========================
   SEARCH
========================= */

document.getElementById("searchBtn").onclick = () => {
 const q = document.getElementById("searchInput").value.toLowerCase();
 const filtered = ALL_PRODUCTS.filter(p =>
   (p.title||"").toLowerCase().includes(q) ||
   (p.creatorName||"").toLowerCase().includes(q)
 );
 displayProducts(filtered);
};

/* =========================
   CATEGORY FILTER
========================= */

document.querySelectorAll(".categories button").forEach(btn=>{
 btn.onclick = () => {
   const type = btn.dataset.type;
   if(type === "all") return displayProducts(ALL_PRODUCTS);
   displayProducts(ALL_PRODUCTS.filter(p => p.type === type));
 };
});

/* =========================
   PARTICLES CANVAS (ORANGE BALLS)
========================= */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<60;i++){
 particles.push({
   x:Math.random()*canvas.width,
   y:Math.random()*canvas.height,
   r:Math.random()*3+2,
   speed:Math.random()*1+0.2
 });
}

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 particles.forEach(p=>{
   ctx.beginPath();
   ctx.fillStyle="rgba(255,122,24,0.7)";
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();

   p.y -= p.speed;

   if(p.y < 0
