<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio - Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://js.stripe.com/v3"></script>

<style>
body{
margin:0;
font-family:system-ui;
color:white;
background:#000;
overflow-x:hidden;
}

/* ===== ORANGE FLOATING ORBS ===== */
.orb{
position:fixed;
border-radius:50%;
background:rgba(255,140,0,0.25);
filter:blur(60px);
animation:float 12s infinite ease-in-out;
z-index:0;
}

.orb:nth-child(1){width:200px;height:200px;top:10%;left:10%;}
.orb:nth-child(2){width:300px;height:300px;top:60%;left:70%;animation-duration:18s;}
.orb:nth-child(3){width:150px;height:150px;top:80%;left:20%;animation-duration:14s;}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0px)}
}

/* ===== CONTENT ===== */
.container{
max-width:1000px;
margin:auto;
padding:20px;
position:relative;
z-index:2;
}

h1{margin-top:20px;}
.author{color:#aaa;}
.price{font-size:22px;margin-top:10px;}

.actions{display:flex;gap:10px;margin-top:16px;}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#ff7b00;
color:white;
font-weight:700;
cursor:pointer;
}

#buyBtn{background:#00c853;color:black;}

#likeCount{margin-top:8px;color:#ffb347;}

.preview{margin-top:20px;}
.preview img,audio{width:100%;}

/* ART */
.art-container{
position:relative;
width:100%;
border-radius:12px;
overflow:hidden;
}
.art-container img{
width:100%;
display:block;
pointer-events:none;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-25deg);
font-size:40px;
font-weight:900;
color:rgba(255,140,0,0.25);
}

/* MODAL */
#paymentModal{
display:none;
position:fixed;
inset:0;
background:#000000cc;
justify-content:center;
align-items:center;
z-index:999;
}

#paymentModalContent{
width:400px;
background:#111;
padding:20px;
border-radius:12px;
}

/* COMMENTS */
.comment{padding:10px;border-bottom:1px solid #333;}
</style>
</head>

<body>

<!-- ORBS -->
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>

<div class="container">

<h1 id="title"></h1>
<div class="author" id="author"></div>
<div class="price" id="price"></div>

<div id="preview" class="preview"></div>

<div class="actions">
<button id="buyBtn">Acheter</button>
<button id="likeBtn">👍 Like</button>
<button id="shareBtn">🔗 Partager</button>
</div>

<div id="likeCount"></div>

<div class="comments">
<h3>Commentaires</h3>
<input id="commentInput" placeholder="Commenter..."
style="width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white">
<div id="commentsList"></div>
</div>

</div>

<!-- PAYMENT -->
<div id="paymentModal">
<div id="paymentModalContent">
<h2>Paiement</h2>
<p id="modalPrice"></p>
<div id="payment-element"></div>
<button id="payBtn">Payer</button>
<button id="cancelBtn">Annuler</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, push, onValue, update } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
authDomain:"lumio-822f0.firebaseapp.com",
databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
projectId:"lumio-822f0"
});

const db=getDatabase(app);
const auth=getAuth(app);

const stripe=Stripe("pk_test_51T5dLtDvG1O1eTGy2yb8ADAX15shxntgDaS31pjExCuVEDoAfc4O3Fet70rVdM7az2HhAcv3qrr4WQF2m0QDgoJW00rtDoDjdA");

let user=null;
let product=null;
let elements=null;
let clientSecret=null;

const params=new URLSearchParams(location.search);
const id=params.get("id");
const type=params.get("type");

const titleEl=document.getElementById("title");
const authorEl=document.getElementById("author");
const priceEl=document.getElementById("price");
const previewEl=document.getElementById("preview");
const buyBtn=document.getElementById("buyBtn");

/* SAFE LOAD */
onAuthStateChanged(auth, async (u)=>{

user=u;

if(!id || !type){
titleEl.textContent="URL invalide";
return;
}

let path="";
if(type==="art") path="arts/";
else if(type==="music") path="musics/";
else if(type==="book") path="books/";
else{
titleEl.textContent="Type invalide";
return;
}

const snap=await get(ref(db,path+id));

if(!snap.exists()){
titleEl.textContent="Produit introuvable";
return;
}

product=snap.val();

titleEl.textContent=product.title;
authorEl.textContent=product.creatorChannelId||"creator";
priceEl.textContent="$"+(product.price||0);

/* ART */
if(type==="art"){
previewEl.innerHTML=`
<div class="art-container">
<img src="${product.cover1URL||product.artURL}">
<div class="watermark">LUMIO</div>
</div>`;
}

loadLikes();
loadComments();

});

/* BUY */
buyBtn.onclick=async()=>{

if(!user) return alert("login required");

document.getElementById("paymentModal").style.display="flex";
document.getElementById("modalPrice").innerText="$"+product.price;

const res=await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
productId:id,
creatorId:product.creatorChannelId,
userId:user.uid
})
});

const data=await res.json();

clientSecret=data.clientSecret;

elements=stripe.elements({clientSecret});
elements.create("payment").mount("#payment-element");

};

document.getElementById("cancelBtn").onclick=()=>{
document.getElementById("paymentModal").style.display="none";
elements=null;
};

document.getElementById("payBtn").onclick=async()=>{
const {error}=await stripe.confirmPayment({elements,redirect:"if_required"});
if(error) alert(error.message);
else alert("success");
};

/* LIKES */
function loadLikes(){
const likeRef=ref(db,type+"Likes/"+id);
onValue(likeRef,s=>{
document.getElementById("likeCount").innerText=
s.exists()?Object.keys(s.val()).length+" likes":"0 likes";
});
}

/* COMMENTS */
function loadComments(){
const cRef=ref(db,type+"Comments/"+id);
onValue(cRef,s=>{
const list=document.getElementById("commentsList");
list.innerHTML="";
if(!s.exists()) return;
Object.values(s.val()).forEach(c=>{
const div=document.createElement("div");
div.className="comment";
div.textContent=c.user+": "+c.text;
list.appendChild(div);
});
});
}

</script>

</body>
</html>
