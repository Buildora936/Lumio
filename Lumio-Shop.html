<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
  margin:0;
  font-family:system-ui;
  color:white;
  background: radial-gradient(circle at 50% 50%, #ff6a00, #ffb347, #ff8c00, #ff4500);
  background-size: 400% 400%;
  animation: epicBg 20s ease infinite;
  overflow-x:hidden;
}

@keyframes epicBg{
  0%{background-position:0% 50%}
  25%{background-position:50% 0%}
  50%{background-position:100% 50%}
  75%{background-position:50% 100%}
  100%{background-position:0% 50%}
}

header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
  position: sticky;
  top:0;
  z-index:100;
}

header h1{
  margin:0;
  font-size:28px;
  color:#fff;
  text-shadow:2px 2px 6px #000;
}

.search-bar{
  max-width:500px;
  margin:20px auto;
  display:flex;
  gap:8px;
}

.search-bar input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  background:rgba(0,0,0,0.2);
  color:white;
}

.search-bar button{
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#fff;
  color:#ff6a00;
  font-weight:700;
  cursor:pointer;
}

.categories{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px 0;
  flex-wrap:wrap;
}

.categories button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.2);
  color:white;
  cursor:pointer;
}

.categories button:hover{
  background:#fff;
  color:#ff6a00;
}

.section-title{
  margin:30px 20px 10px;
  font-size:20px;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:22px;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,0.1);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{
  padding:12px;
}

.title{font-weight:700}
.creator{font-size:13px}
.price{color:#ffb347;font-weight:700;margin-top:5px}

.more{
  margin-top:10px;
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#ffb347;
  cursor:pointer;
}

.bottom-nav{
  display:flex;
  justify-content:space-around;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  padding:12px;
  backdrop-filter:blur(10px);
}

.bottom-nav button{
  background:none;
  border:none;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.bottom-nav button.active{
  color:#ffb347;
}

</style>
</head>

<body>

<header>
<h1>Lumio Shop</h1>

<div class="search-bar">
 <input type="text" id="searchInput" placeholder="Rechercher...">
 <button id="searchBtn"><i class="fa fa-search"></i></button>
</div>
</header>

<div class="categories">
 <button data-type="all">Tous</button>
 <button data-type="book">Livres</button>
 <button data-type="music">Musique</button>
 <button data-type="art">Art</button>
</div>

<h2 class="section-title" id="sectionTitle">For You</h2>
<div class="products" id="products"></div>

<!-- NAV BOTTOM -->
<div class="bottom-nav">
  <button id="forYouBtn" class="active">For You</button>
  <button id="exploreBtn">Explorer</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
 authDomain:"lumio-822f0.firebaseapp.com",
 databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId:"lumio-822f0"
});

const db = getDatabase(app);

let ALL_PRODUCTS = [];
let MODE = "forYou";

/* =========================
   LOAD
========================= */

async function load(){

 const [books,music,arts] = await Promise.all([
   get(ref(db,"books")),
   get(ref(db,"music")),
   get(ref(db,"arts"))
 ]);

 let products = [];

 if(books.exists())
 Object.entries(books.val()).forEach(([id,p])=>
 products.push({...p,id,type:"book"}));

 if(music.exists())
 Object.entries(music.val()).forEach(([id,p])=>
 products.push({...p,id,type:"music"}));

 if(arts.exists())
 Object.entries(arts.val()).forEach(([id,p])=>
 products.push({...p,id,type:"art"}));

 ALL_PRODUCTS = products;

 render();
}

/* =========================
   AI SCORE
========================= */

function score(p){

 const views = p.views || 0;
 const sales = p.sales || 0;
 const age = p.createdAt ? (Date.now()-p.createdAt)/86400000 : 10;

 const recency = 1/age;

 return views*0.25 + sales*0.6 + recency*40;
}

/* =========================
   PERSONALIZATION SIMPLE
========================= */

function forYouList(){

 return [...ALL_PRODUCTS]
 .sort((a,b)=>score(b)-score(a))
 .slice(0,30);
}

function exploreList(){

 return [...ALL_PRODUCTS]
 .sort(()=>Math.random()-0.5)
 .slice(0,30);
}

/* =========================
   RENDER
========================= */

function render(){

 const container = document.getElementById("products");
 container.innerHTML = "";

 let list = MODE==="forYou" ? forYouList() : exploreList();

 document.getElementById("sectionTitle").innerText =
 MODE==="forYou" ? "For You" : "Explorer";

 list.forEach(p=>{

 const card=document.createElement("div");
 card.className="card";

 card.innerHTML=`
   <img src="${p.cover1URL || p.coverURL || 'https://via.placeholder.com/220x180'}">
   <div class="info">
     <div class="title">${p.title}</div>
     <div class="creator">${p.creatorName||"Anonyme"}</div>
     <div class="price">$${p.price||0}</div>
     <button class="more">Voir plus</button>
   </div>
 `;

 card.querySelector(".more").onclick=()=>{
   location.href=`product-detail.html?id=${p.id}&type=${p.type}`;
 };

 container.appendChild(card);

 });

}

/* =========================
   SEARCH
========================= */

function search(q){

 q = q.toLowerCase();

 const filtered = ALL_PRODUCTS.filter(p=>
   (p.title||"").toLowerCase().includes(q) ||
   (p.creatorName||"").toLowerCase().includes(q)
 );

 document.getElementById("products").innerHTML="";

 filtered.forEach(p=>{
   const card=document.createElement("div");
   card.className="card";
   card.innerHTML=`
     <img src="${p.cover1URL || p.coverURL}">
     <div class="info">
       <div class="title">${p.title}</div>
       <div class="creator">${p.creatorName||""}</div>
       <div class="price">$${p.price||0}</div>
     </div>
   `;
   document.getElementById("products").appendChild(card);
 });

}

/* =========================
   EVENTS
========================= */

document.getElementById("searchBtn").onclick=()=>{
 search(document.getElementById("searchInput").value);
};

document.querySelectorAll(".categories button").forEach(btn=>{
 btn.onclick=()=>{
   const type=btn.dataset.type;

   if(type==="all") return render();

   const filtered = ALL_PRODUCTS.filter(p=>p.type===type);

   document.getElementById("products").innerHTML="";

   filtered.forEach(p=>{
     const card=document.createElement("div");
     card.className="card";
     card.innerHTML=`
       <img src="${p.cover1URL || p.coverURL}">
       <div class="info">
         <div class="title">${p.title}</div>
         <div class="creator">${p.creatorName||""}</div>
         <div class="price">$${p.price||0}</div>
       </div>
     `;
     document.getElementById("products").appendChild(card);
   });
 };
});

document.getElementById("forYouBtn").onclick=()=>{
 MODE="forYou";
 document.getElementById("forYouBtn").classList.add("active");
 document.getElementById("exploreBtn").classList.remove("active");
 render();
};

document.getElementById("exploreBtn").onclick=()=>{
 MODE="explore";
 document.getElementById("exploreBtn").classList.add("active");
 document.getElementById("forYouBtn").classList.remove("active");
 render();
};

/* INIT */

load();

</script>

</body>
</html>
