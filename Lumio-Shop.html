<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
  margin:0;
  font-family:system-ui;
  color:white;
  background: radial-gradient(circle at 50% 50%, #ff6a00, #ffb347, #ff8c00, #ff4500);
  background-size: 400% 400%;
  animation: epicBg 20s ease infinite;
  overflow-x:hidden;
}

@keyframes epicBg{
  0%{background-position:0% 50%}
  25%{background-position:50% 0%}
  50%{background-position:100% 50%}
  75%{background-position:50% 100%}
  100%{background-position:0% 50%}
}

header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
  position: sticky;
  top:0;
  z-index:100;
}

header h1{
  margin:0;
  font-size:28px;
  text-shadow:2px 2px 6px #000;
}

.search-bar{
  max-width:500px;
  margin:20px auto;
  display:flex;
  gap:8px;
}

.search-bar input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  background:rgba(0,0,0,0.2);
  color:white;
}

.search-bar button{
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#fff;
  color:#ff6a00;
  font-weight:700;
  cursor:pointer;
}

.categories{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px 0;
  flex-wrap:wrap;
}

.categories button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.2);
  color:white;
  cursor:pointer;
}

.categories button:hover{
  background:#fff;
  color:#ff6a00;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:22px;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(6px);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  display:flex;
  flex-direction:column;
  position:relative;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{
  padding:12px;
}

.title{font-weight:700;font-size:16px}
.creator{font-size:13px}
.price{color:#ffb347;font-weight:700}

.more{
  margin-top:10px;
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#ffb347;
  cursor:pointer;
}

/* =========================
   NAV BOTTOM (FOR YOU / EXPLORE)
========================= */

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  padding:12px 0;
  z-index:200;
}

.bottom-nav button{
  background:none;
  border:none;
  color:white;
  font-size:14px;
  cursor:pointer;
}

.bottom-nav button.active{
  color:#ffb347;
  font-weight:700;
}

.section-title{
  margin:30px 20px 10px;
}

/* spacing bottom for nav */
body{
  padding-bottom:70px;
}

</style>
</head>

<body>

<header>
<h1>Lumio Shop</h1>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="Rechercher...">
<button id="searchBtn"><i class="fa fa-search"></i></button>
</div>
</header>

<div class="categories">
<button data-type="all">Tous</button>
<button data-type="book">Livres</button>
<button data-type="music">Musique</button>
<button data-type="art">Art</button>
</div>

<h2 class="section-title" id="modeTitle">Explorer</h2>

<div class="products" id="products"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<button id="exploreBtn" class="active">Explorer</button>
<button id="forYouBtn">For You</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
 authDomain:"lumio-822f0.firebaseapp.com",
 databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId:"lumio-822f0"
});

const db = getDatabase(app);

let ALL_PRODUCTS = [];
let CURRENT_MODE = "explore";

/* =========================
   LOAD
========================= */

async function loadProducts(){

 const [books,music,arts] = await Promise.all([
   get(ref(db,"books")),
   get(ref(db,"music")),
   get(ref(db,"arts"))
 ]);

 let products = [];

 if(books.exists())
 Object.entries(books.val()).forEach(([id,p])=>products.push({...p,id,type:"book"}));

 if(music.exists())
 Object.entries(music.val()).forEach(([id,p])=>products.push({...p,id,type:"music"}));

 if(arts.exists())
 Object.entries(arts.val()).forEach(([id,p])=>products.push({...p,id,type:"art"}));

 ALL_PRODUCTS = rank(products);

 render(ALL_PRODUCTS);
}

/* =========================
   RANK (global trending)
========================= */

function rank(list){

 const now = Date.now();

 return list.sort((a,b)=>{

 const scoreA =
 (a.views||0)*0.25 +
 (a.sales||0)*0.55 +
 getRecency(a,now)*0.2;

 const scoreB =
 (b.views||0)*0.25 +
 (b.sales||0)*0.55 +
 getRecency(b,now)*0.2;

 return scoreB-scoreA;

 });

}

function getRecency(p,now){
 const created = p.createdAt || now;
 const age = Math.max(1,(now-created)/86400000);
 return 1/age;
}

/* =========================
   RENDER
========================= */

function render(list){

 const container=document.getElementById("products");
 container.innerHTML="";

 const filtered =
 CURRENT_MODE==="forYou"
 ? personalize(list)
 : list;

 filtered.forEach(p=>{

 const card=document.createElement("div");
 card.className="card";

 card.innerHTML=`
 <img src="${p.cover1URL||p.coverURL||'https://via.placeholder.com/220'}">
 <div class="info">
 <div class="title">${p.title}</div>
 <div class="creator">${p.creatorName||"Anonyme"}</div>
 <div class="price">$${p.price||0}</div>
 <button class="more">Voir plus</button>
 </div>
 `;

 card.querySelector(".more").onclick=()=>{
 location.href=`product-detail.html?id=${p.id}&type=${p.type}`;
 };

 container.appendChild(card);

 });

}

/* =========================
   FOR YOU (PERSONNALISATION SIMPLE)
========================= */

function personalize(list){

 const viewed = JSON.parse(localStorage.getItem("lumio_views")||"{}");

 return [...list].sort((a,b)=>{

 const scoreA = (viewed[a.id]||0);
 const scoreB = (viewed[b.id]||0);

 return scoreB-scoreA;

 });

}

/* =========================
   TRACK VIEW
========================= */

function trackView(id){
 const data = JSON.parse(localStorage.getItem("lumio_views")||"{}");
 data[id] = (data[id]||0)+1;
 localStorage.setItem("lumio_views",JSON.stringify(data));
}

/* =========================
   SEARCH
========================= */

function search(q){
 q=q.toLowerCase();
 render(ALL_PRODUCTS.filter(p=>
 (p.title||"").toLowerCase().includes(q) ||
 (p.creatorName||"").toLowerCase().includes(q)
 ));
}

document.getElementById("searchBtn").onclick=()=>{
 search(document.getElementById("searchInput").value);
};

/* =========================
   CATEGORY
========================= */

document.querySelectorAll(".categories button").forEach(btn=>{
 btn.onclick=()=>{
 const t=btn.dataset.type;
 if(t==="all") return render(ALL_PRODUCTS);
 render(ALL_PRODUCTS.filter(p=>p.type===t));
 };
});

/* =========================
   BOTTOM NAV
========================= */

const exploreBtn=document.getElementById("exploreBtn");
const forYouBtn=document.getElementById("forYouBtn");
const title=document.getElementById("modeTitle");

exploreBtn.onclick=()=>{
 CURRENT_MODE="explore";
 exploreBtn.classList.add("active");
 forYouBtn.classList.remove("active");
 title.textContent="Explorer";
 render(ALL_PRODUCTS);
};

forYouBtn.onclick=()=>{
 CURRENT_MODE="forYou";
 forYouBtn.classList.add("active");
 exploreBtn.classList.remove("active");
 title.textContent="For You";
 render(ALL_PRODUCTS);
};

/* =========================
   INIT
========================= */

loadProducts();

</script>

</body>
</html>
