<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
  margin:0;
  font-family:system-ui;
  color:white;
  background: radial-gradient(circle at 50% 50%, #ff6a00, #ffb347, #ff8c00, #ff4500);
  background-size: 400% 400%;
  animation: epicBg 20s ease infinite;
  overflow-x:hidden;
}

@keyframes epicBg{
  0%{background-position:0% 50%}
  25%{background-position:50% 0%}
  50%{background-position:100% 50%}
  75%{background-position:50% 100%}
  100%{background-position:0% 50%}
}

header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
  position: sticky;
  top:0;
  z-index:100;
}

header h1{
  margin:0;
  font-size:28px;
  color:#fff;
  text-shadow:2px 2px 6px #000;
}

.search-bar{
  max-width:500px;
  margin:20px auto;
  display:flex;
  gap:8px;
}

.search-bar input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  background:rgba(0,0,0,0.2);
  color:white;
}

.search-bar button{
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#fff;
  color:#ff6a00;
  font-weight:700;
  cursor:pointer;
}

.categories{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px 0;
  flex-wrap:wrap;
}

.categories button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.2);
  color:white;
  cursor:pointer;
  transition:.2s;
}

.categories button:hover{
  background:#fff;
  color:#ff6a00;
  font-weight:700;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:22px;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(6px);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  display:flex;
  flex-direction:column;
  position: relative;
}

.card::after{
  content:"";
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:radial-gradient(circle, rgba(255,140,0,0.1), transparent 70%);
  opacity:0.7;
  pointer-events:none;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{
  padding:12px;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.title{
  font-weight:700;
  font-size:16px;
  margin-bottom:6px;
}

.creator{
  color:#fff;
  font-size:13px;
  margin-bottom:6px;
}

.price{
  color:#ffb347;
  font-weight:700;
  margin-bottom:6px;
}

.more{
  margin-top:auto;
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#ffb347;
  color:black;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.more:hover{
  background:#ff9500;
}

.section-title{
  margin:30px 20px 10px;
  font-size:20px;
  color:white;
}

</style>
</head>

<body>

<header>
<h1>Lumio Shop</h1>

<div class="search-bar">
 <input type="text" id="searchInput" placeholder="Rechercher un produit...">
 <button id="searchBtn"><i class="fa fa-search"></i></button>
</div>
</header>

<div class="categories">
 <button data-type="all">Tous</button>
 <button data-type="book">Livres</button>
 <button data-type="music">Musique</button>
 <button data-type="art">Art</button>
</div>

<h2 class="section-title">Nouveautés</h2>
<div class="products" id="products"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
 authDomain:"lumio-822f0.firebaseapp.com",
 databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId:"lumio-822f0"
});

const db = getDatabase(app);

let ALL_PRODUCTS = [];

/* =========================
   LOAD
========================= */

async function loadProducts(){

 const [books,music,arts] = await Promise.all([
   get(ref(db,"books")),
   get(ref(db,"music")),
   get(ref(db,"arts"))
 ]);

 let products = [];

 if(books.exists())
 Object.entries(books.val()).forEach(([id,p])=>
 products.push({...p,id,type:"book"}));

 if(music.exists())
 Object.entries(music.val()).forEach(([id,p])=>
 products.push({...p,id,type:"music"}));

 if(arts.exists())
 Object.entries(arts.val()).forEach(([id,p])=>
 products.push({...p,id,type:"art"}));

 ALL_PRODUCTS = rankAI(products);
 render(ALL_PRODUCTS);
}

/* =========================
   AI RANKING ENGINE
========================= */

function rankAI(products){

 const now = Date.now();

 return products.sort((a,b)=>{

   const scoreA = computeScore(a, now);
   const scoreB = computeScore(b, now);

   return scoreB - scoreA;
 });
}

/* =========================
   SCORING SYSTEM
========================= */

function computeScore(p, now){

 const views = p.views || 0;
 const sales = p.sales || 0;

 /* recency boost (produits récents favorisés) */
 const createdAt = p.createdAt || now;
 const ageDays = Math.max(1, (now - createdAt) / (1000*60*60*24));
 const recency = 1 / ageDays;

 return (
   views * 0.25 +
   sales * 0.55 +
   recency * 50
 );
}

/* =========================
   RENDER
========================= */

function render(list){

 const container = document.getElementById("products");
 container.innerHTML = "";

 list.forEach(p=>{

 const card = document.createElement("div");
 card.className="card";

 card.innerHTML = `
   <img src="${p.cover1URL || p.coverURL || p.artURL}">
   <div class="info">
     <div class="title">${p.title}</div>
     <div class="creator">${p.creatorName || "Anonyme"}</div>
     <div class="price">$${p.price || 0}</div>
     <button class="more">Voir plus</button>
   </div>
 `;

 card.querySelector(".more").onclick = ()=>{
   location.href = `product-detail.html?id=${p.id}&type=${p.type}`;
 };

 container.appendChild(card);
 });

}

/* =========================
   SEARCH (AI FILTER)
========================= */

function search(q){

 q = q.toLowerCase();

 const filtered = ALL_PRODUCTS.filter(p =>
   (p.title||"").toLowerCase().includes(q) ||
   (p.creatorName||"").toLowerCase().includes(q)
 );

 render(filtered);
}

document.getElementById("searchBtn").onclick = ()=>{
 search(document.getElementById("searchInput").value);
};

/* =========================
   CATEGORY FILTER
========================= */

document.querySelectorAll(".categories button").forEach(btn=>{
 btn.onclick = ()=>{

   const type = btn.dataset.type;

   if(type==="all") return render(ALL_PRODUCTS);

   render(ALL_PRODUCTS.filter(p=>p.type===type));
 };
});

/* =========================
   INIT
========================= */

loadProducts();

</script>
</body>
</html>
