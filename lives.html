<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lives – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:white;
}

header{
  height:56px;
  background:#181818;
  display:flex;
  align-items:center;
  padding:0 16px;
}
header h2{
  margin:0;
  font-size:18px;
}

.container{
  max-width:1200px;
  margin:20px auto;
  padding:0 16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

.live-card{
  background:#181818;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}
.live-card:hover{
  transform:scale(1.03);
}

.thumb{
  position:relative;
}
.thumb img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.badge-live{
  position:absolute;
  top:10px;
  left:10px;
  background:#ff0000;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:700;
}

.viewers{
  position:absolute;
  bottom:10px;
  right:10px;
  background:rgba(0,0,0,.7);
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.info{
  padding:12px;
}
.info h3{
  margin:0 0 6px;
  font-size:15px;
}
.channel{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color:#ccc;
}
.channel img{
  width:28px;
  height:28px;
  border-radius:50%;
}

.empty{
  text-align:center;
  margin-top:80px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <h2>Lives 🔴</h2>
</header>

<div class="container" id="livesContainer"></div>
<div class="empty" id="empty" style="display:none">
  Aucun live en cours pour le moment
</div>

<script type="module">
import { initializeApp } from
 "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";

import { getDatabase, ref, onValue, get }
 from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

/* ================= INIT ================= */

const app = initializeApp({
  apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain: "lumio-822f0.firebaseapp.com",
  databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId: "lumio-822f0",
  storageBucket: "lumio-822f0.firebasestorage.app",
  messagingSenderId: "833325770824",
  appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
});

const db = getDatabase(app);

const container = document.getElementById("livesContainer");
const empty = document.getElementById("empty");

/* ================= HELPERS ================= */

function getThumbnail(url){
  return url || "https://via.placeholder.com/640x360?text=Live";
}

function getAvatar(){
  return "https://ui-avatars.com/api/?background=ff0000&color=fff&name=L";
}

/* ================= LOAD LIVES ================= */

onValue(ref(db,"lives"), async snap=>{

  container.innerHTML="";
  let count=0;

  const promises=[];

  snap.forEach(l=>{
    const live = l.val();

    if(live.status !== "live") return;

    count++;

    promises.push(renderLiveCard(l.key, live));
  });

  await Promise.all(promises);

  empty.style.display = count ? "none" : "block";
});

/* ================= RENDER CARD ================= */

async function renderLiveCard(liveId, live){

  // récupérer viewers en temps réel
  let viewerCount = 0;

  try{
    const viewersSnap = await get(ref(db,`liveViewers/${liveId}`));
    if(viewersSnap.exists()){
      viewerCount = Object.keys(viewersSnap.val()).length;
    }
  }catch(e){}

  const card = document.createElement("div");
  card.className="live-card";

  card.onclick = async ()=>{

    const snap = await get(ref(db,`lives/${liveId}`));

    if(!snap.exists() || snap.val().status !== "live"){
      alert("Ce live est terminé");
      return;
    }

    location.href=`live.html?id=${liveId}`;
  };

  card.innerHTML = `
    <div class="thumb">
      <img src="${getThumbnail(live.thumbnail)}"
           onerror="this.src='https://via.placeholder.com/640x360?text=Live'">
      <div class="badge-live">LIVE</div>
      <div class="viewers">${viewerCount} spectateurs</div>
    </div>

    <div class="info">
      <h3>${live.title || "Live sans titre"}</h3>
      <div class="channel">
        <img src="${getAvatar()}">
        <span>${live.channelName || "Créateur"}</span>
      </div>
    </div>
  `;

  container.appendChild(card);
}
</script>

</body>
</html>
