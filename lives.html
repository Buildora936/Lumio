<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lives – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:white;
}

header{
  height:56px;
  background:#181818;
  display:flex;
  align-items:center;
  padding:0 16px;
}

.container{
  max-width:1200px;
  margin:20px auto;
  padding:0 16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

.live-card{
  background:#181818;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}
.live-card:hover{ transform:scale(1.03); }

.thumb{ position:relative; }
.thumb img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.badge-live{
  position:absolute;
  top:10px;
  left:10px;
  background:#ff0000;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:700;
}

.viewers{
  position:absolute;
  bottom:10px;
  right:10px;
  background:rgba(0,0,0,.7);
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.info{ padding:12px; }

.channel{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color:#ccc;
}

.channel img{
  width:28px;
  height:28px;
  border-radius:50%;
}

/* STATES */

.loading,
.empty{
  text-align:center;
  margin-top:80px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <h2>Lives 🔴</h2>
</header>

<div class="container" id="livesContainer"></div>

<div class="loading" id="loading">Chargement...</div>
<div class="empty" id="empty" style="display:none">
  Aucun live en cours
</div>

<script type="module">

import { supabase } from "./supabase.js";

/* ================= DOM ================= */

const container = document.getElementById("livesContainer");
const empty = document.getElementById("empty");
const loading = document.getElementById("loading");

/* ================= STATE ================= */

const cardsMap = {};

/* ================= HELPERS ================= */

function thumb(url){
  return url || "https://via.placeholder.com/640x360?text=Live";
}

function avatar(name="L"){
  return `https://ui-avatars.com/api/?background=ff0000&color=fff&name=${name}`;
}

/* ================= LOAD LIVES ================= */

async function loadLives(){

  loading.style.display="block";

  const { data, error } = await supabase
    .from("lives")
    .select("*")
    .eq("status","live")
    .order("created_at",{ ascending:false });

  loading.style.display="none";

  if(error){
    console.error(error);
    empty.style.display="block";
    return;
  }

  container.innerHTML="";
  Object.keys(cardsMap).forEach(k=>delete cardsMap[k]);

  if(!data || data.length===0){
    empty.style.display="block";
    return;
  }

  empty.style.display="none";

  data.forEach(live=>{
    const card = createCard(live);
    container.appendChild(card);

    cardsMap[live.id] = card;

    listenViewers(live.id);
  });

}

/* ================= CARD ================= */

function createCard(live){

  const card = document.createElement("div");
  card.className="live-card";

  card.innerHTML = `
    <div class="thumb">
      <img src="${thumb(live.thumbnail)}"
           onerror="this.src='https://via.placeholder.com/640x360?text=Live'">
      <div class="badge-live">LIVE</div>
      <div class="viewers" id="v_${live.id}">0 spectateurs</div>
    </div>

    <div class="info">
      <h3>${live.title || "Live"}</h3>
      <div class="channel">
        <img src="${avatar(live.title?.charAt(0) || "L")}">
        <span>${live.channel_name || "Créateur"}</span>
      </div>
    </div>
  `;

  /* 🔒 NAVIGATION SECURE */

  card.onclick = async ()=>{

    const { data, error } = await supabase
      .from("lives")
      .select("status")
      .eq("id", live.id)
      .single();

    if(error || !data){
      alert("Live introuvable");
      return;
    }

    if(data.status !== "live"){
      alert("Ce live est terminé");
      return;
    }

    location.href = `live.html?id=${live.id}`;
  };

  return card;
}

/* ================= VIEWERS REALTIME ================= */

function listenViewers(liveId){

  const el = document.getElementById(`v_${liveId}`);
  if(!el) return;

  supabase
    .channel("viewers_"+liveId)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "viewers",
        filter: `live_id=eq.${liveId}`
      },
      async ()=>{
        const { count } = await supabase
          .from("viewers")
          .select("*",{ count:"exact", head:true })
          .eq("live_id", liveId);

        el.textContent = (count || 0) + " spectateurs";
      }
    )
    .subscribe();

}

/* ================= INIT ================= */

loadLives();

</script>
</body>
</html>
