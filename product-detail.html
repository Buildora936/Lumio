<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  color:white;
  background:#111;
  overflow-x:hidden;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* COVER */
.cover{
  width:100%;
  height:340px;
  border-radius:16px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

/* WATERMARK */
.cover::after{
  content:"LUMIO";
  position:absolute;
  bottom:10px;
  right:10px;
  font-size:24px;
  color:rgba(255,255,255,0.3);
  font-weight:700;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  width:350px;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
  font-size:18px;
}

/* STARS */
.star{font-size:24px;color:#555}
.star.full{color:gold}
.star.half{
  background:linear-gradient(90deg,gold 50%,#555 50%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* DISABLE RIGHT CLICK */
img{pointer-events:none}

</style>
</head>

<body oncontextmenu="return false">

<div class="container">

<div id="cover" class="cover"></div>

<h1 id="title"></h1>
<div class="author" id="author"></div>
<div class="price" id="price"></div>

<div id="preview" class="preview"></div>

<div class="actions">
  <button id="buyBtn">Acheter</button>
  <button id="likeBtn">👍 Like</button>
  <button id="shareBtn">🔗 Partager</button>
</div>

<div id="likeCount"></div>

<div class="rating">
  <div>Note moyenne :</div>
  <div id="ratingDisplay"></div>

  <div>Donner une note :</div>
  <span class="star" data-v="1">★</span>
  <span class="star" data-v="2">★</span>
  <span class="star" data-v="3">★</span>
  <span class="star" data-v="4">★</span>
  <span class="star" data-v="5">★</span>
</div>

<div class="comments">
  <h3>Commentaires</h3>
  <input id="commentInput" placeholder="Commenter..." style="width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white">
  <div id="commentsList"></div>
</div>

<div class="related">
  <h3>Produits similaires</h3>
  <div id="relatedGrid" class="grid"></div>
</div>

</div>

<!-- MODAL PAIEMENT -->
<div class="modal" id="paymentModal">
  <div class="modal-content">
    <div class="close" id="closeModal">✖</div>
    <h3>Paiement</h3>
    <div id="payment-element"></div>
    <button id="payNow">Payer</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase,ref,get,push,onValue,update,increment,set } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app=initializeApp({
  apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain:"lumio-822f0.firebaseapp.com",
  databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId:"lumio-822f0"
});

const db=getDatabase(app);
const auth=getAuth(app);

const stripe = Stripe("pk_test_XXXXX"); // remplace

let elements, clientSecret;

let user=null;
onAuthStateChanged(auth,u=>user=u);

const params=new URLSearchParams(location.search);
const id=params.get("id");
const type=params.get("type");

const title=document.getElementById("title");
const author=document.getElementById("author");
const price=document.getElementById("price");
const cover=document.getElementById("cover");

const modal=document.getElementById("paymentModal");

/* LOAD */
const snap=await get(ref(db,type+"s/"+id));
const data=snap.val();

title.textContent=data.title;
author.textContent=data.creatorName||"Créateur";
price.textContent="$"+data.price;

cover.style.backgroundImage=`url(${data.cover1URL})`;

/* BUY -> OPEN MODAL */
buyBtn.onclick=async()=>{
  if(!user) return alert("Connexion requise");

  modal.style.display="flex";

  const res=await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      price:data.price,
      productId:id,
      creatorId:data.creatorChannelId,
      userId:user.uid,
      title:data.title,
      downloadURL:data.artURL,
      stripeAccount:data.stripe_account_id
    })
  });

  const d=await res.json();
  clientSecret=d.clientSecret;

  elements=stripe.elements({clientSecret});
  const el=elements.create("payment");
  el.mount("#payment-element");
};

/* CLOSE MODAL */
closeModal.onclick=()=> modal.style.display="none";

/* PAY */
payNow.onclick=async()=>{
  const {error,paymentIntent}=await stripe.confirmPayment({
    elements,
    redirect:"if_required"
  });

  if(error){
    alert(error.message);
    return;
  }

  if(paymentIntent.status==="succeeded"){
    alert("Paiement réussi");

    await set(ref(db,"userLibrary/"+user.uid+"/"+id),{
      title:data.title,
      download:data.artURL
    });

    modal.style.display="none";
  }
};

/* SHARE MOBILE */
shareBtn.onclick=()=>{
  if(navigator.share){
    navigator.share({
      title:data.title,
      url:location.href
    });
  }
};

/* RATING SYSTEM */
onValue(ref(db,type+"Ratings/"+id),snap=>{
  if(!snap.exists()) return;

  const values=Object.values(snap.val());
  const avg=values.reduce((a,b)=>a+b,0)/values.length;

  const percent=(avg/5)*100;

  let starsHTML="";
  let full=Math.floor(avg);
  let half=(avg%1)>=0.5;

  for(let i=0;i<full;i++) starsHTML+='<span class="star full">★</span>';
  if(half) starsHTML+='<span class="star half">★</span>';

  document.getElementById("ratingDisplay").innerHTML=
    starsHTML+" ("+Math.round(percent)+"%)";
});

/* DISABLE DRAG */
document.addEventListener("dragstart",e=>e.preventDefault());

</script>

</body>
</html>
