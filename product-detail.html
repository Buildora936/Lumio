   <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>

body{
margin:0;
font-family:system-ui;
color:white;
background:#111;
overflow-x:hidden;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* COVER */

.cover{
width:100%;
height:340px;
border-radius:16px;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
}

/* ANIMATION MUSIC */

.music-bg::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(255,140,0,0.2),transparent);
animation:spin 8s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* BOOK BUBBLES */

.book-bg::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(#ff7b00 1px,transparent 1px);
background-size:20px 20px;
animation:move 6s linear infinite;
}

@keyframes move{
from{background-position:0 0}
to{background-position:0 40px}
}

/* ART BRUSH */

.art-bg::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(45deg,transparent,rgba(255,140,0,0.4),transparent);
animation:brush 4s infinite;
}

@keyframes brush{
0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}
}

/* TEXT */

h1{margin-top:20px}
.author{color:#aaa}
.price{font-size:22px;margin-top:10px}

/* BUTTONS */

.actions{
display:flex;
gap:10px;
margin-top:16px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#ff7b00;
color:white;
font-weight:700;
cursor:pointer;
}

/* LIKE */

#likeCount{
margin-top:8px;
color:#ffb347;
}

/* RATING */

.rating{
margin-top:20px;
}

.star{
font-size:24px;
cursor:pointer;
color:#555;
}

.star.active{
color:gold;
}

/* COMMENTS */

.comments{
margin-top:30px;
}

.comment{
padding:10px;
border-bottom:1px solid #333;
}

/* RELATED */

.related{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:14px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

/* PREVIEW */

.preview{
margin-top:20px;
}

audio{
width:100%;
margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<div id="cover" class="cover"></div>

<h1 id="title"></h1>
<div class="author" id="author"></div>
<div class="price" id="price"></div>

<div id="preview" class="preview"></div>

<div class="actions">
<button id="likeBtn">👍 Like</button>
<button id="shareBtn">🔗 Partager</button>
</div>

<div id="likeCount"></div>

<div class="rating">
<div>Donner une note :</div>
<span class="star" data-v="1">★</span>
<span class="star" data-v="2">★</span>
<span class="star" data-v="3">★</span>
<span class="star" data-v="4">★</span>
<span class="star" data-v="5">★</span>
</div>

<div class="comments">

<h3>Commentaires</h3>

<input id="commentInput" placeholder="Commenter..." style="width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white">

<div id="commentsList"></div>

</div>

<div class="related">

<h3>Produits similaires</h3>

<div id="relatedGrid" class="grid"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase,ref,get,push,onValue,update,increment } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app=initializeApp({
apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
authDomain:"lumio-822f0.firebaseapp.com",
databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
projectId:"lumio-822f0"
});

const db=getDatabase(app);
const auth=getAuth(app);

let user=null;

onAuthStateChanged(auth,u=>user=u);

const params=new URLSearchParams(location.search);

const id=params.get("id");
const type=params.get("type");

const title=document.getElementById("title");
const author=document.getElementById("author");
const price=document.getElementById("price");
const cover=document.getElementById("cover");
const preview=document.getElementById("preview");

let data;

/* LOAD PRODUCT */

const snap=await get(ref(db,type+"s/"+id));

if(!snap.exists()){
title.textContent="Produit introuvable";
throw "";
}

data=snap.val();

/* VIEW COUNT */

update(ref(db,type+"Views/"+id),{
count:increment(1)
});

/* UI */

title.textContent=data.title;
author.textContent=data.creatorName||"Créateur";
price.textContent="$"+(data.price||0);

/* COVER */

cover.style.backgroundImage=`url(${data.cover1URL||data.coverBase64})`;

/* STYLE PAR TYPE */

if(type==="music"){
cover.classList.add("music-bg");

preview.innerHTML=`
<audio controls>
<source src="${data.musicURL}">
</audio>
`;

}

if(type==="book"){
cover.classList.add("book-bg");

preview.innerHTML=`
<button onclick="alert('extrait livre')">Lire un extrait</button>
`;

}

if(type==="art"){
cover.classList.add("art-bg");

preview.innerHTML=`
<img src="${data.cover1URL}" style="width:100%;border-radius:10px">
`;

}

/* LIKE */

document.getElementById("likeBtn").onclick=async()=>{

if(!user) return alert("Connecte toi");

await update(ref(db,type+"Likes/"+id),{
[user.uid]:true
});

};

onValue(ref(db,type+"Likes/"+id),snap=>{
if(!snap.exists())return;
document.getElementById("likeCount").textContent=
Object.keys(snap.val()).length+" likes";
});

/* SHARE */

document.getElementById("shareBtn").onclick=()=>{

if(navigator.share){

navigator.share({
title:data.title,
url:location.href
});

}else{

navigator.clipboard.writeText(location.href);
alert("Lien copié");

}

};

/* RATING */

document.querySelectorAll(".star").forEach(star=>{

star.onclick=async()=>{

if(!user)return alert("Connexion requise");

const value=star.dataset.v;

await update(ref(db,type+"Ratings/"+id),{
[user.uid]:Number(value)
});

};

});

/* COMMENTS */

const input=document.getElementById("commentInput");

input.addEventListener("keypress",async e=>{

if(e.key==="Enter"){

if(!user)return alert("Connexion");

const text=input.value.trim();

if(!text)return;

await push(ref(db,type+"Comments/"+id),{

user:user.email,
text,
date:Date.now()

});

input.value="";

}

});

onValue(ref(db,type+"Comments/"+id),snap=>{

const list=document.getElementById("commentsList");

list.innerHTML="";

if(!snap.exists())return;

Object.values(snap.val())
.sort((a,b)=>b.date-a.date)
.forEach(c=>{

const div=document.createElement("div");

div.className="comment";

div.textContent=c.user+" : "+c.text;

list.appendChild(div);

});

});

/* RELATED */

async function loadRelated(){

const snap=await get(ref(db,type+"s"));

if(!snap.exists())return;

const grid=document.getElementById("relatedGrid");

Object.entries(snap.val()).slice(0,20).forEach(([pid,p])=>{

if(pid===id)return;

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<img src="${p.cover1URL||p.coverBase64}">
<div>${p.title}</div>
`;

card.onclick=()=>{

location.href="product-detail.html?id="+pid+"&type="+type;

};

grid.appendChild(card);

});

}

loadRelated();

</script>

</body>
</html>
