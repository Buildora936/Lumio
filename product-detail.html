<!DOCTYPE html>  <html lang="fr">  
<head>  
<meta charset="UTF-8">  
<title>Lumio - Product</title>  
<meta name="viewport" content="width=device-width,initial-scale=1.0">  
<script src="https://js.stripe.com/v3"></script>  
<style>  
body{margin:0;font-family:system-ui;color:white;background:#111;overflow-x:hidden;}  
.container{max-width:1000px;margin:auto;padding:20px;}  
h1{margin-top:20px;}  
.author{color:#aaa;}  
.price{font-size:22px;margin-top:10px;}  
.actions{display:flex;gap:10px;margin-top:16px;}  
button{flex:1;padding:12px;border:none;border-radius:10px;background:#ff7b00;color:white;font-weight:700;cursor:pointer;}  
#buyBtn{background:#00c853;color:black;}  
#likeCount{margin-top:8px;color:#ffb347;}  
.rating{margin-top:20px;}  
.star{font-size:24px;cursor:pointer;color:#555;position: relative;}  
.star.active{color:gold;}  
.star.half::after{content:"★";position:absolute;color:gold;width:50%;overflow:hidden;display:inline-block;}  
.comments{margin-top:30px;}  
.comment{padding:10px;border-bottom:1px solid #333;}  
.related{margin-top:40px;}  
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}  
.card{background:#1c1c1c;padding:10px;border-radius:10px;cursor:pointer;}  
.card img{width:100%;height:150px;object-fit:cover;border-radius:8px;}  
.preview{margin-top:20px;}  
.preview img,audio{width:100%;}  
#paymentModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;justify-content:center;align-items:center;z-index:999;}  
#paymentModalContent{width:400px;background:#1c1c1c;padding:20px;border-radius:12px;}  
#paymentModalContent img{width:100%;border-radius:8px;margin-bottom:10px;}  
.art-container{position:relative;width:100%;border-radius:12px;overflow:hidden;}  
.art-container img{width:100%;display:block;user-select:none;-webkit-user-drag:none;pointer-events:none;}  
.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-25deg);font-size:48px;font-weight:900;color:rgba(255,140,0,0.25);letter-spacing:2px;pointer-events:none;user-select:none;}  
</style>  
</head>  
<body>  <div class="container">  
  <h1 id="title"></h1>  
  <div class="author" id="author"></div>  
  <div class="price" id="price"></div>  
  <div id="preview" class="preview"></div>    <div class="actions">  
    <button id="buyBtn">Obtenir</button>  
    <button id="likeBtn">👍 Like</button>  
    <button id="shareBtn">🔗 Partager</button>  
  </div>    <div id="likeCount"></div>    <div class="rating">  
    <div>Donner une note :</div>  
    <span class="star" data-v="1">★</span>  
    <span class="star" data-v="2">★</span>  
    <span class="star" data-v="3">★</span>  
    <span class="star" data-v="4">★</span>  
    <span class="star" data-v="5">★</span>  
  </div>    <div class="comments">  
    <h3>Commentaires</h3>  
    <input id="commentInput" placeholder="Commenter..." style="width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white">  
    <div id="commentsList"></div>  
  </div>    <div class="related">  
    <h3>Produits similaires</h3>  
    <div id="relatedGrid" class="grid"></div>  
  </div>  
</div>  <div id="paymentModal">  
  <div id="paymentModalContent">  
    <h2>Paiement</h2>  
    <p id="modalPrice" style="font-size:20px;margin:10px 0"></p>  
    <div id="payment-element"></div>  
    <button id="payBtn">Payer</button>  
    <button id="cancelBtn" style="background:#444;margin-top:10px">Annuler</button>  
  </div>  
</div>   
    

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, push, onValue, update } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain:"lumio-822f0.firebaseapp.com",
  databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId:"lumio-822f0"
});

const db = getDatabase(app);
const auth = getAuth(app);

const stripe = Stripe("pk_test_51T5dLtDvG1O1eTGy2yb8ADAX15shxntgDaS31pjExCuVEDoAfc4O3Fet70rVdM7az2HhAcv3qrr4WQF2m0QDgoJW00rtDoDjdA");

let user = null;

const params = new URLSearchParams(location.search);
const id = params.get("id");
const type = params.get("type");

const titleEl = document.getElementById("title");
const authorEl = document.getElementById("author");
const priceEl = document.getElementById("price");
const previewEl = document.getElementById("preview");
const buyBtn = document.getElementById("buyBtn");

/* ✅ FIX CRITIQUE */
if(!id || !type){
  titleEl.textContent = "Produit invalide";
  buyBtn.disabled = true;
  throw new Error("Missing id or type in URL");
}

let product;
let elements, clientSecret;

/* ✅ AUTH + LOAD PRODUIT */
onAuthStateChanged(auth, async (u)=>{

user = u;

let path = "";

if(type === "music") path = "musics/";
else if(type === "art") path = "arts/";
else if(type === "book") path = "books/";
else {
  titleEl.textContent = "Type invalide";
  buyBtn.disabled = true;
  return;
}

try{
  const testRef = ref(db, "arts");
const testSnap = await get(testRef);

console.log("ALL ARTS =", testSnap.val());
  if(!snap.exists()){
    titleEl.textContent="Produit introuvable";
    buyBtn.disabled=true;
    return;
  }

  product = snap.val();

}catch(err){
  console.error("Firebase error:", err);
  titleEl.textContent="Erreur chargement";
  return;
}

/* PURCHASE CHECK */
if(user){
  try{
    const purchaseSnap = await get(ref(db, "purchases/"+user.uid+"/"+id));
    if(purchaseSnap.exists()){
      buyBtn.innerText = "Déjà acheté";
      buyBtn.disabled = true;
    }
  }catch(e){}
}

/* UI */
titleEl.textContent = product.title;
authorEl.textContent = product.creatorName || "Créateur";
priceEl.textContent = "$"+(product.price||0);

previewEl.innerHTML="";

if(type==="music"){
  previewEl.innerHTML=`<audio controls src="${product.musicURL}"></audio>`;
}
else if(type==="book"){
  previewEl.innerHTML=`<button onclick="alert('extrait livre')">Lire un extrait</button>`;
}
else if(type==="art"){
  previewEl.innerHTML = `
  <div class="art-container">
    <img src="${product.artURL}">
    <div class="watermark">
      LUMIO - ${product.creatorName || product.creatorChannelId}
    </div>
  </div>`;
}

loadRelated();
loadLikes();
updateRatingUI(type,id);
loadComments();

});

/* BUY */
buyBtn.onclick = async ()=>{
  if(!user){ alert("Connexion requise"); return; }

  if(elements) return;

  buyBtn.disabled = true;
  buyBtn.innerText = "Chargement...";

  document.getElementById("paymentModal").style.display="flex";
  document.getElementById("modalPrice").innerText = "$"+product.price;
  document.getElementById("payment-element").innerHTML = "";

  await createPaymentIntent();

  buyBtn.disabled = false;
  buyBtn.innerText = "Acheter";
};

/* CANCEL */
document.getElementById("cancelBtn").onclick = ()=>{
  document.getElementById("paymentModal").style.display="none";
  if(elements){ elements = null }
  document.getElementById("payment-element").innerHTML="";
};

/* STRIPE */
async function createPaymentIntent(){
  const channelSnap = await get(ref(db,"channels/"+product.creatorChannelId));
  const stripeAccountId = channelSnap.exists() ? channelSnap.val().stripe_account_id : null;

  if(!stripeAccountId || !stripeAccountId.startsWith("acct_")){
    alert("Compte Stripe invalide");
    return;
  }

  const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      productId: id,
      creatorId: product.creatorChannelId,
      userId: user.uid
    })
  });

  if(!res.ok){ alert("Erreur serveur"); return; }

  const data = await res.json();
  if(!data.clientSecret){ alert("Erreur Stripe"); return; }

  clientSecret = data.clientSecret;

  elements = stripe.elements({ clientSecret });

  const paymentElement = elements.create("payment");
  paymentElement.mount("#payment-element");
}

/* PAY */
document.getElementById("payBtn").onclick = async ()=>{
  if(!elements){ alert("Paiement non prêt"); return; }

  const {error} = await stripe.confirmPayment({ elements, redirect:"if_required" });

  if(error){
    alert(error.message);
  } else {
    alert("Paiement réussi");
    document.getElementById("paymentModal").style.display="none";
    elements=null;
    document.getElementById("payment-element").innerHTML="";
  }
};

/* LIKES */
function loadLikes(){
  const likeRef = ref(db,type+"Likes/"+id);
  onValue(likeRef,snap=>{
    document.getElementById("likeCount").textContent = snap.exists()? Object.keys(snap.val()).length+" likes":"0 likes";
  });
  document.getElementById("likeBtn").onclick = async ()=>{
    if(!user) return alert("Connecte toi");
    await update(ref(db,type+"Likes/"+id),{[user.uid]:true});
  }
}

/* SHARE */
document.getElementById("shareBtn").onclick=()=>{
  if(navigator.share){ navigator.share({title:product.title,url:location.href}).catch(()=>{}); }
  else { navigator.clipboard.writeText(location.href); alert("Lien copié"); }
};

/* RATING */
function updateRatingUI(type,id){
  const stars = document.querySelectorAll(".star");
  get(ref(db,type+"Ratings/"+id)).then(snap=>{
    if(!snap.exists()) return;
    const ratings = Object.values(snap.val());
    const total = ratings.length;
    const sum = ratings.reduce((a,b)=>a+b,0);
    const avgPercent = (sum/(total*5))*100;
    stars.forEach((star,index)=>{
      const starValue = (index+1)*20;
      if(avgPercent>=starValue){ star.classList.add("active"); star.classList.remove("half"); }
      else if(avgPercent>starValue-20 && avgPercent<starValue){ star.classList.add("half"); star.classList.remove("active"); }
      else{ star.classList.remove("active","half"); }
    });
  });

  stars.forEach(star=>{
    star.onclick=async()=>{
      if(!user) return alert("Connexion requise");
      const value=Number(star.dataset.v);
      await update(ref(db,type+"Ratings/"+id),{[user.uid]:value});
      updateRatingUI(type,id);
    };
  });
}

/* COMMENTS */
function loadComments(){
  const commentsRef = ref(db,type+"Comments/"+id);
  onValue(commentsRef,snap=>{
    const list=document.getElementById("commentsList");
    list.innerHTML="";
    if(!snap.exists()) return;
    Object.values(snap.val()).sort((a,b)=>b.date-a.date).forEach(c=>{
      const div=document.createElement("div");
      div.className="comment";
      div.textContent = c.user + " : " + c.text;
      list.appendChild(div);
    });
  });

  const input = document.getElementById("commentInput");
  input.addEventListener("keypress", async e=>{
    if(e.key==="Enter"){
      if(!user) return alert("Connexion requise");
      const text=input.value.trim();
      if(!text) return;
      await push(ref(db,type+"Comments/"+id),{ user:user.email, text, date:Date.now() });
      input.value="";
    }
  });
}

/* RELATED */
async function loadRelated(){
  const snap=await get(ref(db,type+"s"));
  if(!snap.exists()) return;
  const grid=document.getElementById("relatedGrid");
  Object.entries(snap.val()).slice(0,20).forEach(([pid,p])=>{
    if(pid===id) return;
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<img src="${p.cover1URL || p.artURL}"><div>${p.title}</div>`;
    card.onclick=()=>location.href=`product-detail.html?id=${pid}&type=${type}`;
    grid.appendChild(card);
  });
}

/* PROTECTION */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && ["s","u","c","x"].includes(e.key.toLowerCase())){
    e.preventDefault();
  }
});
</script>

</body>  
</html>
