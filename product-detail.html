<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  color:white;
  background:#111;
  overflow-x:hidden;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* COVER */
.cover{
  width:100%;
  max-height:400px;
  border-radius:16px;
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
  position:relative;
  overflow:hidden;
}

/* WATERMARK ART */
.cover::after {
  content: "LUMIO";
  position: absolute;
  color: rgba(255,255,255,0.15);
  font-size: 60px;
  font-weight: 900;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-25deg);
  pointer-events: none;
}

/* TEXT */
h1{margin-top:20px}
.author{color:#aaa}
.price{font-size:22px;margin-top:10px}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}
button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff7b00;
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* BUY BUTTON */
#buyBtn{
  background:#00c853;
  color:black;
}

/* LIKE */
#likeCount{
  margin-top:8px;
  color:#ffb347;
}

/* RATING */
.rating{
  margin-top:20px;
  position: relative;
}
.star{
  font-size:24px;
  cursor:pointer;
  color:#555;
  position: relative;
}
.star.active{ color:gold; }
.star.half::after{
  content: "★";
  position: absolute;
  color: gold;
  width: 50%;
  overflow: hidden;
  display: inline-block;
}

/* COMMENTS */
.comments{
  margin-top:30px;
}
.comment{
  padding:10px;
  border-bottom:1px solid #333;
}

/* RELATED */
.related{
  margin-top:40px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:14px;
}
.card{
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

/* PREVIEW */
.preview{
  margin-top:20px;
  max-height:200px;
}
.preview img,audio{
  width:100%;
}

/* MODAL */
#paymentModal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#000000cc;
  justify-content:center;
  align-items:center;
  z-index:999;
}
#paymentModalContent{
  width:400px;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}
#paymentModalContent img{
  width:100%;
  border-radius:8px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="container">
  <div id="cover" class="cover"></div>

  <h1 id="title"></h1>
  <div class="author" id="author"></div>
  <div class="price" id="price"></div>

  <div id="preview" class="preview"></div>

  <div class="actions">
    <button id="buyBtn">Acheter</button>
    <button id="likeBtn">👍 Like</button>
    <button id="shareBtn">🔗 Partager</button>
  </div>

  <div id="likeCount"></div>

  <div class="rating">
    <div>Donner une note :</div>
    <span class="star" data-v="1">★</span>
    <span class="star" data-v="2">★</span>
    <span class="star" data-v="3">★</span>
    <span class="star" data-v="4">★</span>
    <span class="star" data-v="5">★</span>
  </div>

  <div class="comments">
    <h3>Commentaires</h3>
    <input id="commentInput" placeholder="Commenter..." style="width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white">
    <div id="commentsList"></div>
  </div>

  <div class="related">
    <h3>Produits similaires</h3>
    <div id="relatedGrid" class="grid"></div>
  </div>
</div>

<!-- MODAL -->
<div id="paymentModal">
  <div id="paymentModalContent">
    <h2>Paiement</h2>
    <img id="modalImage">
    <h3 id="modalTitle"></h3>
    <p id="modalPrice"></p>
    <div id="payment-element"></div>
    <button id="payBtn">Payer</button>
    <button id="cancelBtn" style="background:#444;margin-top:10px">Annuler</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, push, onValue, update, increment } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain:"lumio-822f0.firebaseapp.com",
  databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId:"lumio-822f0"
});
const db = getDatabase(app);
const auth = getAuth(app);

let user = null;
onAuthStateChanged(auth,u=>user=u);

const params=new URLSearchParams(location.search);
const id=params.get("id");
const type=params.get("type");

const titleEl=document.getElementById("title");
const authorEl=document.getElementById("author");
const priceEl=document.getElementById("price");
const coverEl=document.getElementById("cover");
const previewEl=document.getElementById("preview");
const buyBtn=document.getElementById("buyBtn");
let product;

// LOAD PRODUCT
(async ()=>{
  const snap = await get(ref(db,type+"s/"+id));
  if(!snap.exists()){
    titleEl.textContent="Produit introuvable";
    buyBtn.disabled=true;
    return;
  }
  product = snap.val();

  // VIEW COUNT
  update(ref(db,type+"Views/"+id),{count:increment(1)});

  // UI
  titleEl.textContent = product.title;
  authorEl.textContent = creatorChannelId
.name || "Créateur de lumio";
  priceEl.textContent = "$"+(product.price||0);

  // COVER & PREVIEW
  coverEl.style.backgroundImage = `url(${product.cover1URL||product.coverBase64})`;

  previewEl.innerHTML = "";
  if(type==="music"){
    previewEl.innerHTML=`<audio controls><source src="${product.musicURL}"></audio>`;
  } else if(type==="book"){
    previewEl.innerHTML=`<button onclick="alert('extrait livre')">Lire un extrait</button>`;
  } else if(type==="art"){
    previewEl.innerHTML=`<img src="${product.artURL}" style="width:100%;border-radius:10px">`;
  }

  // RELATED
  loadRelated();
  // Ratings
  updateRatingUI(type,id);
  // Likes
  loadLikes();
  // Comments
  loadComments();
})();

// BUY BUTTON => OPEN MODAL
buyBtn.onclick = ()=> {
  if(!user){ alert("Connexion requise"); return; }
  document.getElementById("paymentModal").style.display="flex";
  document.getElementById("modalImage").src = product.cover1URL;
  document.getElementById("modalTitle").innerText = product.title;
  document.getElementById("modalPrice").innerText = "$"+product.price;
  createPaymentIntent();
}

// CANCEL BUTTON
document.getElementById("cancelBtn").onclick = ()=> {
  document.getElementById("paymentModal").style.display="none";
  document.getElementById("payment-element").innerHTML="";
}

// STRIPE
const stripe = Stripe("pk_test_51T5dLtDvG1O1eTGy2yb8ADAX15shxntgDaS31pjExCuVEDoAfc4O3Fet70rVdM7az2HhAcv3qrr4WQF2m0QDgoJW00rtDoDjdA");
let elements, clientSecret;
async function createPaymentIntent(){
  const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      price: product.price,
      productId: id,
      creatorId: product.creatorChannelId,
      userId: user.uid,
      title: product.title,
      downloadURL: product.artURL,
      stripeAccount: product.stripe_account_id,
      category: product.category || "produit"
    })
  });
  const data = await res.json();
  if(!data.clientSecret){ alert("Erreur Stripe"); return; }
  clientSecret = data.clientSecret;
  elements = stripe.elements({ clientSecret });
  const paymentElement = elements.create("payment");
  paymentElement.mount("#payment-element");
}
document.getElementById("payBtn").onclick = async ()=>{
  if(!elements){ alert("Paiement non prêt"); return; }
  const {error} = await stripe.confirmPayment({ elements, redirect:"if_required" });
  if(error){ alert(error.message); } 
  else { alert("Paiement en cours ou réussi"); document.getElementById("paymentModal").style.display="none"; }
}

// Likes
function loadLikes(){
  const likeRef = ref(db,type+"Likes/"+id);
  onValue(likeRef,snap=>{
    const count = snap.exists()? Object.keys(snap.val()).length : 0;
    document.getElementById("likeCount").textContent = count + " likes";
  });
  document.getElementById("likeBtn").onclick = async ()=>{
    if(!user) return alert("Connecte toi");
    await update(ref(db,type+"Likes/"+id),{[user.uid]:true});
  }
}

// Share
document.getElementById("shareBtn").onclick=()=>{
  if(navigator.share){
    navigator.share({title:product.title,url:location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(location.href);
    alert("Lien copié");
  }
}

// Ratings
function updateRatingUI(type,id){
  const stars = document.querySelectorAll(".star");
  get(ref(db,type+"Ratings/"+id)).then(snap=>{
    if(!snap.exists()) return;
    const ratings = Object.values(snap.val());
    const total = ratings.length;
    const sum = ratings.reduce((a,b)=>a+b,0);
    const avgPercent = (sum/(total*5))*100;
    stars.forEach((star,index)=>{
      const starValue = (index+1)*20;
      if(avgPercent>=starValue){ star.classList.add("active"); star.classList.remove("half"); }
      else if(avgPercent>starValue-20 && avgPercent<starValue){ star.classList.add("half"); star.classList.remove("active"); }
      else{ star.classList.remove("active","half"); }
    });
  });

  stars.forEach(star=>{
    star.onclick=async()=>{
      if(!user) return alert("Connexion requise");
      const value=Number(star.dataset.v);
      await update(ref(db,type+"Ratings/"+id),{[user.uid]:value});
      updateRatingUI(type,id);
    };
  });
}

// Comments
function loadComments(){
  const commentsRef = ref(db,type+"Comments/"+id);
  onValue(commentsRef,snap=>{
    const list=document.getElementById("commentsList");
    list.innerHTML="";
    if(!snap.exists()) return;
    Object.values(snap.val()).sort((a,b)=>b.date-a.date)
      .forEach(c=>{
        const div = document.createElement("div");
        div.className="comment";
        div.textContent = c.user+" : "+c.text;
        list.appendChild(div);
      });
  });

  const input = document.getElementById("commentInput");
  input.addEventListener("keypress", async e=>{
    if(e.key==="Enter"){
      if(!user) return alert("Connexion requise");
      const text=input.value.trim();
      if(!text) return;
      await push(ref(db,type+"Comments/"+id),{ user:user.email, text, date:Date.now() });
      input.value="";
    }
  });
}

// Related
async function loadRelated(){
  const snap=await get(ref(db,type+"s"));
  if(!snap.exists()) return;
  const grid=document.getElementById("relatedGrid");
  Object.entries(snap.val()).slice(0,20).forEach(([pid,p])=>{
    if(pid===id) return;
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<img src="${p.artURL||p.coverBase64}"><div>${p.title}</div>`;
    card.onclick=()=>location.href=`product-detail.html?id=${pid}&type=${type}`;
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
