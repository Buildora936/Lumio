<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  color:white;
  background:#111;
  overflow-x:hidden;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* COVER */
.cover{
  width:100%;
  height:340px;
  border-radius:16px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

/* WATERMARK */
.cover::after{
  content:"LUMIO";
  position:absolute;
  bottom:10px;
  right:10px;
  font-size:22px;
  opacity:0.3;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-box{
  width:400px;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}
button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff7b00;
  color:white;
  font-weight:700;
  cursor:pointer;
}
#buyBtn{ background:#00c853;color:black }

/* STARS */
.star{
  font-size:24px;
  color:#555;
}
.star.full{ color:gold }
.star.half{
  background:linear-gradient(90deg,gold 50%,#555 50%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* PAYMENT */
#payment-element{margin-top:10px}
</style>
</head>

<body>

<div class="container">

<div id="cover" class="cover"></div>

<h1 id="title"></h1>
<div id="author"></div>
<div id="price"></div>

<div class="actions">
  <button id="buyBtn">Acheter</button>
  <button id="likeBtn">👍 Like</button>
  <button id="shareBtn">🔗 Partager</button>
</div>

<div id="ratingDisplay"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div class="close" id="closeModal">✖</div>
    <h3>Paiement</h3>
    <div id="payment-element"></div>
    <button id="payBtn">Payer</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase,ref,get,push,set,onValue,update } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app=initializeApp({
 apiKey:"AIzaSy...",
 authDomain:"lumio-822f0.firebaseapp.com",
 databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId:"lumio-822f0"
});

const db=getDatabase(app);
const auth=getAuth(app);

const stripe = Stripe("pk_test_XXX");

let user, product, elements;

const id=new URLSearchParams(location.search).get("id");
const type=new URLSearchParams(location.search).get("type");

/* AUTH */
onAuthStateChanged(auth,u=>user=u);

/* LOAD PRODUCT */
const snap=await get(ref(db,type+"s/"+id));
product=snap.val();

document.getElementById("title").textContent=product.title;
document.getElementById("price").textContent="$"+product.price;

const cover=document.getElementById("cover");
cover.style.backgroundImage=`url(${product.cover1URL})`;

/* PROTECTION IMAGE */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("dragstart",e=>e.preventDefault());

/* SHARE */
document.getElementById("shareBtn").onclick=()=>{
 if(navigator.share){
  navigator.share({
    title:product.title,
    url:location.href
  });
 }else{
  navigator.clipboard.writeText(location.href);
  alert("Lien copié");
 }
};

/* ====== RATING SYSTEM ====== */
onValue(ref(db,type+"Ratings/"+id),snap=>{
 if(!snap.exists()) return;

 const ratings=Object.values(snap.val());
 const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;

 const percent = (avg/5)*100;

 let starsHTML="";

 let full=Math.floor(avg);
 let half=(avg-full)>=0.5;

 for(let i=1;i<=5;i++){
   if(i<=full) starsHTML+=`<span class="star full">★</span>`;
   else if(i===full+1 && half) starsHTML+=`<span class="star half">★</span>`;
   else starsHTML+=`<span class="star">★</span>`;
 }

 document.getElementById("ratingDisplay").innerHTML =
 starsHTML+" ("+Math.round(percent)+"%)";
});

/* ====== MODAL ====== */
const modal=document.getElementById("modal");

document.getElementById("buyBtn").onclick=async()=>{
 if(!user){alert("Connexion requise");return;}
 modal.style.display="flex";
 await initPayment();
};

document.getElementById("closeModal").onclick=()=>{
 modal.style.display="none";
};

/* ====== STRIPE ====== */
async function initPayment(){

 const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify({
    price:product.price,
    productId:id,
    creatorId:product.creatorChannelId,
    userId:user.uid,
    title:product.title,
    downloadURL:product.artURL,
    stripeAccount:product.stripe_account_id
  })
 });

 const data=await res.json();

 if(!data.clientSecret){
  alert("Erreur paiement");
  return;
 }

 elements=stripe.elements({clientSecret:data.clientSecret});

 const paymentElement=elements.create("payment");
 paymentElement.mount("#payment-element");
}

/* ====== PAY ====== */
document.getElementById("payBtn").onclick=async()=>{

 const {error,paymentIntent}=await stripe.confirmPayment({
  elements,
  redirect:"if_required"
 });

 if(error){
  alert(error.message);
  return;
 }

 if(paymentIntent.status==="succeeded"){
  await savePurchase();
  modal.style.display="none";
  alert("Paiement réussi");
 }else{
  alert("Statut: "+paymentIntent.status);
 }

};

/* SAVE */
async function savePurchase(){

 const purchaseRef=push(ref(db,"purchases"));

 await set(purchaseRef,{
  user:user.uid,
  productId:id,
  price:product.price,
  date:Date.now()
 });

 await set(ref(db,"userLibrary/"+user.uid+"/"+id),{
  title:product.title,
  download:product.artURL,
  image:product.cover1URL
 });

}

</script>

</body>
</html>
