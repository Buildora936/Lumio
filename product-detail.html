<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  color:white;
  background:#111;
  overflow-x:hidden;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* COVER */
.cover{
  width:100%;
  height:340px;
  border-radius:16px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}

/* ANIMATION MUSIC */
.music-bg::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,140,0,0.2),transparent);
  animation:spin 8s linear infinite;
}
@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* BOOK BUBBLES */
.book-bg::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image:radial-gradient(#ff7b00 1px,transparent 1px);
  background-size:20px 20px;
  animation:move 6s linear infinite;
}
@keyframes move{
  from{background-position:0 0}
  to{background-position:0 40px}
}

/* ART BRUSH */
.art-bg::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(45deg,transparent,rgba(255,140,0,0.4),transparent);
  animation:brush 4s infinite;
}
@keyframes brush{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* WATERMARK ART */
.art-bg::after {
  content: "LUMIO";
  position: absolute;
  color: rgba(255,255,255,0.15);
  font-size: 80px;
  font-weight: 900;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-25deg);
  pointer-events: none;
}

/* TEXT */
h1{margin-top:20px}
.author{color:#aaa}
.price{font-size:22px;margin-top:10px}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}
button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff7b00;
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* BUY BUTTON */
#buyBtn{
  background:#00c853;
  color:black;
}

/* LIKE */
#likeCount{
  margin-top:8px;
  color:#ffb347;
}

/* RATING */
.rating{
  margin-top:20px;
  position: relative;
}
.star{
  font-size:24px;
  cursor:pointer;
  color:#555;
  position: relative;
}
.star.active{ color:gold; }
.star.half::after{
  content: "★";
  position: absolute;
  color: gold;
  width: 50%;
  overflow: hidden;
  display: inline-block;
}

/* COMMENTS */
.comments{
  margin-top:30px;
}
.comment{
  padding:10px;
  border-bottom:1px solid #333;
}

/* RELATED */
.related{
  margin-top:40px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:14px;
}
.card{
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

/* PREVIEW */
.preview{
  margin-top:20px;
}
audio{
  width:100%;
  margin-top:10px;
}

/* DESACTIVER CLICK DROIT SUR IMAGE */
#cover, .preview img {
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: auto;
  -webkit-touch-callout: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}
</style>
</head>
<body>
  
<div id="preview" class="preview"></div>

<div id="cover" class="cover"></div>

<h1 id="title"></h1>
<div class="author" id="author"></div>
<div class="price" id="price"></div>

<div id="preview" class="preview"></div>

<div class="actions">
  <button id="buyBtn">Acheter</button>
  <button id="likeBtn">👍 Like</button>
  <button id="shareBtn">🔗 Partager</button>
</div>

<div id="likeCount"></div>

<div class="rating">
  <div>Donner une note :</div>
  <span class="star" data-v="1">★</span>
  <span class="star" data-v="2">★</span>
  <span class="star" data-v="3">★</span>
  <span class="star" data-v="4">★</span>
  <span class="star" data-v="5">★</span>
</div>

<div class="comments">
  <h3>Commentaires</h3>
  <input id="commentInput" placeholder="Commenter..." style="width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white">
  <div id="commentsList"></div>
</div>

<div class="related">
  <h3>Produits similaires</h3>
  <div id="relatedGrid" class="grid"></div>
</div>
<div id="paymentModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;justify-content:center;align-items:center;z-index:999">

  <div style="width:400px;background:#1c1c1c;padding:20px;border-radius:12px">

    <h2>Paiement</h2>

    <img id="modalImage" style="width:100%;border-radius:8px;margin-bottom:10px">

    <h3 id="modalTitle"></h3>
    <p id="modalPrice"></p>

    <div id="payment-element"></div>

    <button id="payBtn">Payer</button>
    <button onclick="closeModal()" style="background:#444;margin-top:10px">Annuler</button>

  </div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase,ref,get,push,onValue,update,increment } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app=initializeApp({
  apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain:"lumio-822f0.firebaseapp.com",
  databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId:"lumio-822f0"
});

const db=getDatabase(app);
const auth=getAuth(app);

let user=null;
onAuthStateChanged(auth,u=>user=u);

const params=new URLSearchParams(location.search);
const id=params.get("id");
const type=params.get("type");

const title=document.getElementById("title");
const author=document.getElementById("author");
const price=document.getElementById("price");
const cover=document.getElementById("cover");
const preview=document.getElementById("preview");
const buyBtn=document.getElementById("buyBtn");

let data;

/* LOAD PRODUCT */
const snap=await get(ref(db,type+"s/"+id));
if(!snap.exists()){
  title.textContent="Produit introuvable";
  buyBtn.disabled=true;
  throw "";
}
data=snap.val();

/* VIEW COUNT */
update(ref(db,type+"Views/"+id),{count:increment(1)});

/* UI */
title.textContent=data.title;
author.textContent=data.creatorName||"Créateur";
price.textContent="$"+(data.price||0);

/* COVER & TYPE */
cover.style.backgroundImage=`url(${data.cover1URL||data.coverBase64})`;

if(type==="music"){
  cover.classList.add("music-bg");
  preview.innerHTML=`<audio controls><source src="${data.musicURL}"></audio>`;
}
if(type==="book"){
  cover.classList.add("book-bg");
  preview.innerHTML=`<button onclick="alert('extrait livre')">Lire un extrait</button>`;
}
if(type==="art"){
  cover.classList.add("art-bg");
  preview.innerHTML=`<img src="${data.artURL
}" style="width:100%;border-radius:10px">`;
}

/* BUY BUTTON => ouvre modal */
buyBtn.onclick = async ()=>{
  if(!user){
    alert("Connexion requise")
    return
  }

  openPaymentModal()
}

  const stripe = Stripe("pk_test_51T5dLtDvG1O1eTGy2yb8ADAX15shxntgDaS31pjExCuVEDoAfc4O3Fet70rVdM7az2HhAcv3qrr4WQF2m0QDgoJW00rtDoDjdA")

let elements
let clientSecret

function openPaymentModal(){
  document.getElementById("paymentModal").style.display = "flex"

  document.getElementById("modalImage").src = product.cover1URL
  document.getElementById("modalTitle").innerText = product.title
  document.getElementById("modalPrice").innerText = "$"+product.price

  createPaymentIntent()
}

function closeModal(){
  document.getElementById("paymentModal").style.display = "none"
  document.getElementById("payment-element").innerHTML = ""
}

/* CREATE PAYMENT */
async function createPaymentIntent(){

  const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      price: product.price,
      productId: id,
      creatorId: product.creatorChannelId,
      userId: user.uid,
      title: product.title,
      downloadURL: product.artURL,
      stripeAccount: product.stripe_account_id,
      category: product.category || "art"
    })
  })

  const data = await res.json()

  if(!data.clientSecret){
    alert("Erreur Stripe")
    return
  }

  clientSecret = data.clientSecret

  elements = stripe.elements({ clientSecret })

  const paymentElement = elements.create("payment")

  paymentElement.mount("#payment-element")
}

/* PAY */
document.getElementById("payBtn").onclick = async ()=>{

  if(!elements){
    alert("Paiement non prêt")
    return
  }

  const {error} = await stripe.confirmPayment({
    elements,
    redirect: "if_required"
  })

  if(error){
    alert(error.message)
  }else{
    alert("Paiement en cours ou réussi")
    closeModal()
  }
}
  
/* LIKE */
document.getElementById("likeBtn").onclick=async()=>{
  if(!user) return alert("Connecte toi");
  await update(ref(db,type+"Likes/"+id),{[user.uid]:true});
};

onValue(ref(db,type+"Likes/"+id),snap=>{
  if(!snap.exists())return;
  document.getElementById("likeCount").textContent=
    Object.keys(snap.val()).length+" likes";
});

/* SHARE */
document.getElementById("shareBtn").onclick=()=>{
  if(navigator.share){
    navigator.share({title:data.title,url:location.href})
      .catch(err=>console.log("Partage annulé:",err));
  }else{
    navigator.clipboard.writeText(location.href);
    alert("Lien copié");
  }
};

/* RATING */
function updateRatingUI(type,id){
  const stars = document.querySelectorAll(".star");
  get(ref(db,type+"Ratings/"+id)).then(snap=>{
    if(!snap.exists()) return;
    const ratings = Object.values(snap.val());
    const total = ratings.length;
    const sum = ratings.reduce((a,b)=>a+b,0);
    const avgPercent = (sum/(total*5))*100;
    stars.forEach((star,index)=>{
      const starValue = (index+1)*20;
      if(avgPercent>=starValue){
        star.classList.add("active");
        star.classList.remove("half");
      } else if(avgPercent>starValue-20 && avgPercent<starValue){
        star.classList.add("half");
        star.classList.remove("active");
      } else {
        star.classList.remove("active","half");
      }
    });
  });
}
updateRatingUI(type,id);

document.querySelectorAll(".star").forEach(star=>{
  star.onclick=async()=>{
    if(!user) return alert("Connexion requise");
    const value=star.dataset.v;
    await update(ref(db,type+"Ratings/"+id),{[user.uid]:Number(value)});
    updateRatingUI(type,id);
  };
});

/* COMMENTS */
const input=document.getElementById("commentInput");
input.addEventListener("keypress",async e=>{
  if(e.key==="Enter"){
    if(!user)return alert("Connexion requise");
    const text=input.value.trim();
    if(!text)return;
    await push(ref(db,type+"Comments/"+id),{
      user:user.email,
      text,
      date:Date.now()
    });
    input.value="";
  }
});

onValue(ref(db,type+"Comments/"+id),snap=>{
  const list=document.getElementById("commentsList");
  list.innerHTML="";
  if(!snap.exists())return;
  Object.values(snap.val()).sort((a,b)=>b.date-a.date)
  .forEach(c=>{
    const div=document.createElement("div");
    div.className="comment";
    div.textContent=c.user+" : "+c.text;
    list.appendChild(div);
  });
});

/* RELATED */
async function loadRelated(){
  const snap=await get(ref(db,type+"s"));
  if(!snap.exists()) return;
  const grid=document.getElementById("relatedGrid");
  Object.entries(snap.val()).slice(0,20).forEach(([pid,p])=>{
    if(pid===id) return;
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<img src="${p.artURL
||p.coverBase64}"><div>${p.title}</div>`;
    card.onclick=()=>location.href=`product-detail.html?id=${pid}&type=${type}`;
    grid.appendChild(card);
  });
}
loadRelated();

/* PROTECTION CLICK DROIT SUR COVER ET PREVIEW */
const protectedElements = [document.getElementById("cover"), document.querySelector(".preview img")];
protectedElements.forEach(el=>{
  if(el){
    el.addEventListener("contextmenu", e=>e.preventDefault());
  }
});


</script>
</body>
</html>
