<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  color:white;
  background:#111;
}

/* ANTI CLICK */
img{
  pointer-events:none;
  user-select:none;
}

/* WATERMARK */
.watermark{
  position:absolute;
  top:10px;
  left:10px;
  opacity:0.15;
  font-size:20px;
  font-weight:700;
  pointer-events:none;
}

/* COVER */
.cover{
  width:100%;
  height:340px;
  border-radius:16px;
  background-size:cover;
  position:relative;
  overflow:hidden;
}

/* BLUR (screen record basic protection) */
.blur{
  filter:blur(20px);
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  width:400px;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}

/* STARS */
.star{
  font-size:24px;
  color:#555;
}
.star.full{color:gold}
.star.half{color:gold; opacity:0.5}

</style>
</head>

<body>

<div class="container">

<div id="cover" class="cover">
<div class="watermark">LUMIO</div>
</div>

<h1 id="title"></h1>
<div id="author"></div>
<div id="price"></div>

<button id="buyBtn">Acheter</button>

<div id="rating"></div>
<div id="ratingPercent"></div>

</div>

<!-- MODAL PAIEMENT -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Paiement</h3>
    <div id="payment-element"></div>
    <button id="pay">Payer</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase,ref,get,push,onValue,update } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app=initializeApp({
  apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",    
  authDomain:"lumio-822f0.firebaseapp.com",    
  databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",    
  projectId:"lumio-822f0"  
});

const db=getDatabase(app);
const auth=getAuth(app);

let user=null;
onAuthStateChanged(auth,u=>user=u);

const params=new URLSearchParams(location.search);
const id=params.get("id");
const type=params.get("type");

let data;

/* LOAD */
const snap=await get(ref(db,type+"s/"+id));
data=snap.val();

document.getElementById("title").textContent=data.title;
document.getElementById("author").textContent=data.creatorName;
document.getElementById("price").textContent="$"+data.price;

const cover=document.getElementById("cover");
cover.style.backgroundImage=`url(${data.cover1URL})`;

/* ANTI SCREEN RECORD BASIC */
document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    cover.classList.add("blur");
  }else{
    cover.classList.remove("blur");
  }
});

/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu",e=>e.preventDefault());

/* SHARE */
document.getElementById("buyBtn").onclick=()=>{
  if(!user){ alert("Connexion requise"); return; }
  openModal();
};

/* RATING SYSTEM */
onValue(ref(db,type+"Ratings/"+id),snap=>{
  if(!snap.exists()) return;

  const ratings=Object.values(snap.val());
  const avg = ratings.reduce((a,b)=>a+b,0)/ratings.length;

  const percent = (avg/5)*100;

  document.getElementById("ratingPercent").textContent =
    percent.toFixed(0)+"% ("+ratings.length+" avis)";

  let starsHTML="";
  let full=Math.floor(avg);
  let half=(avg%1)>=0.5;

  for(let i=1;i<=5;i++){
    if(i<=full){
      starsHTML+=`<span class="star full">★</span>`;
    }else if(i===full+1 && half){
      starsHTML+=`<span class="star half">★</span>`;
    }else{
      starsHTML+=`<span class="star">★</span>`;
    }
  }

  document.getElementById("rating").innerHTML=starsHTML;
});

/* MODAL */
const modal=document.getElementById("modal");

function openModal(){
  modal.style.display="flex";
}

/* STRIPE */
const stripe=Stripe("pk_test_...");

let elements;

async function initPayment(){

const res=await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-product-payment-intent",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
  price:data.price,
  productId:id,
  creatorId:data.creatorChannelId,
  userId:user.uid,
  title:data.title,
  downloadURL:data.artURL,
  stripeAccount:data.stripe_account_id
})
});

const json=await res.json();

elements=stripe.elements({clientSecret:json.clientSecret});
elements.create("payment").mount("#payment-element");

}

initPayment();

/* PAY */
document.getElementById("pay").onclick=async()=>{

const {error,paymentIntent}=await stripe.confirmPayment({
elements,
redirect:"if_required"
});

if(error){
alert(error.message);
return;
}

if(paymentIntent.status==="succeeded"){
alert("Paiement réussi !");
}

};

</script>

</body>
</html>
