<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:system-ui;
  color:white;
}
header{
  height:56px;
  background:#181818;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}
header h2{
  margin:0;
  font-size:18px;
}
.main{
  display:flex;
  gap:16px;
  padding:16px;
  max-width:1400px;
  margin:auto;
}
.video-area{
  flex:2;
}
video{
  width:100%;
  height:70vh;
  background:black;
  border-radius:12px;
}
.live-info{
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}
.chat{
  flex:1;
  background:#181818;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  height:75vh;
}
.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:12px;
}
.msg{
  margin-bottom:10px;
  font-size:14px;
}
.msg span{
  font-weight:600;
}
.chat-input{
  display:flex;
  padding:10px;
  gap:8px;
  border-top:1px solid #333;
}
.chat-input input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#222;
  color:white;
}
.chat-input button{
  background:#ff0000;
  border:none;
  padding:10px 14px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}
/* Soutenir button */
#supportBtn{
  background:#ff9800;
  border:none;
  padding:12px 20px;
  border-radius:25px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}
#supportBtn:hover{
  background:#e68a00;
}
/* Modal */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:100;
}
.modal-content{
  background:#181818;
  padding:20px;
  border-radius:12px;
  max-width:400px;
  width:90%;
}
.modal h3{
  margin-top:0;
  color:#ff9800;
}
.modal label{
  display:block;
  margin:10px 0 5px;
}
.modal input, .modal select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
  margin-bottom:10px;
}
.modal button{
  margin-top:15px;
  background:#ff9800;
  color:black;
  border:none;
  padding:12px;
  width:100%;
  font-weight:700;
  border-radius:20px;
  cursor:pointer;
}
.modal button:hover{
  background:#e68a00;
}
</style>
</head>
<body>

<header>
  <h2 id="liveTitle">🔴 Live</h2>
  <div id="viewerCount">0 spectateurs</div>
</header>

<div class="main">
 <div id="videoStatus" style="position:absolute;color:white;padding:10px">
  Connexion au live...
</div>
  <div class="video-area">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="live-info">
      Chaîne : <span id="channelName"></span>
    </div>
    <button id="supportBtn">💛 Soutenir ce live</button>
  </div>

  <div class="chat">
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input id="msgInput" placeholder="Écrire un message...">
      <button id="sendBtn">
        <i class="fa fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>

<!-- Modal Soutenir -->
<div class="modal" id="supportModal">
  <div class="modal-content">
    <h3>Soutenir le créateur</h3>
    <label>Montant ($)</label>
    <input type="number" id="supportAmount" min="1" value="5">

    <!-- Nouvelle sélection pour méthode de paiement -->
    <label>Méthode de paiement</label>
    <select id="paymentMethod">
      <option value="card">Carte bancaire</option>
      <option value="paypal">PayPal</option>
      <option value="samsung_pay">Samsung Pay</option>
    </select>

    <label>Numéro de carte</label>
    <div id="card-element"></div>

    <button id="payBtn">Payer</button>
    <div id="supportError" style="color:#ff5555;margin-top:8px;"></div>
  </div>
</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* ================= SUPABASE ================= */

const SUPABASE_URL = "https://ymcrkbcsuloijemdbqzy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltY3JrYmNzdWxvaWplbWRicXp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMTg0OTUsImV4cCI6MjA4NTg5NDQ5NX0.DH7S5cdFSwD5i1RNs_QYyubJUar8ANtdEImyj1ZqOjw";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= PARAMS ================= */

const params = new URLSearchParams(location.search);
const liveId = params.get("id");
if (!liveId) location.href = "index.html";

/* ================= DOM ================= */

const remoteVideo = document.getElementById("remoteVideo");
const viewerCountEl = document.getElementById("viewerCount");
const messages = document.getElementById("messages");
const sendBtn = document.getElementById("sendBtn");
const msgInput = document.getElementById("msgInput");

/* ================= STATE ================= */

let currentUser = null;
let viewerId = null;
let lastMessageTime = 0;
const MESSAGE_DELAY = 1500;

/* ================= AUTH ================= */

const { data: { user } } = await supabase.auth.getUser();

if (!user) {
  location.href = "login.html";
} else {
  currentUser = user;
  viewerId = user.id;
}

/* ================= LOAD LIVE ================= */

const { data: live, error } = await supabase
  .from("lives")
  .select("*")
  .eq("id", liveId)
  .single();

if (error || !live) {
  alert("Live introuvable");
  location.href = "index.html";
}

if (live.status === "ended") {
  alert("Live terminé");
  location.href = "index.html";
}

document.getElementById("liveTitle").textContent = "🔴 " + live.title;
document.getElementById("channelName").textContent = live.channel_name;

/* ================= PRESENCE (VIEWERS) ================= */

const channel = supabase.channel("live_" + liveId, {
  config: {
    presence: {
      key: viewerId
    }
  }
});

channel.on("presence", { event: "sync" }, () => {
  const state = channel.presenceState();
  const count = Object.keys(state).length;
  viewerCountEl.textContent = count + " spectateurs";
});

await channel.subscribe(async (status) => {
  if (status === "SUBSCRIBED") {
    await channel.track({
      user: viewerId
    });
  }
});

/* ================= CHAT REALTIME ================= */

const chatChannel = supabase.channel("chat_" + liveId);

chatChannel.on(
  "postgres_changes",
  {
    event: "INSERT",
    schema: "public",
    table: "messages",
    filter: `live_id=eq.${liveId}`
  },
  (payload) => {
    const msg = payload.new;

    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<span>${msg.user_name}</span>: ${msg.text}`;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }
);

chatChannel.subscribe();

/* ================= SEND MESSAGE ================= */

sendBtn.onclick = async () => {

  const now = Date.now();

  if (now - lastMessageTime < MESSAGE_DELAY) {
    alert("Trop rapide");
    return;
  }

  const text = msgInput.value.trim();
  if (!text) return;

  if (text.length > 200) {
    alert("Message trop long");
    return;
  }

  msgInput.value = "";
  lastMessageTime = now;

  await supabase.from("chat_messages").insert({
    live_id: liveId,
    user_id: currentUser.id,
    user_name: currentUser.user_metadata?.name || "Invité",
    message: text,
    created_at: new Date().toISOString()
  });
};

/* ================= INPUT UX ================= */

msgInput.addEventListener("input", () => {
  sendBtn.disabled = !msgInput.value.trim();
});

/* ================= WEBRTC (TEMPORAIRE) ================= */

let pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

pc.ontrack = (event) => {
  remoteVideo.srcObject = event.streams[0];
};

remoteVideo.muted = true;

/* ================= STRIPE (UNCHANGED) ================= */

const supportBtn = document.getElementById("supportBtn");
const modal = document.getElementById("supportModal");
const payBtn = document.getElementById("payBtn");
const amountInput = document.getElementById("supportAmount");
const errorBox = document.getElementById("supportError");

supportBtn.onclick = () => { modal.style.display = "flex"; };
window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };

const stripeJs = await import("https://js.stripe.com/v3/index.js");
const stripe = Stripe("pk_test_51T5dLtDvG1O1eTGy2yb8ADAX15shxntgDaS31pjExCuVEDoAfc4O3Fet70rVdM7az2HhAcv3qrr4WQF2m0QDgoJW00rtDoDjdA");
const elements = stripe.elements();
const cardElement = elements.create("card");
cardElement.mount("#card-element");

payBtn.onclick = async () => {

  errorBox.textContent = "";
  const amount = parseFloat(amountInput.value);

  if (!amount || amount < 1) {
    errorBox.textContent = "Montant invalide";
    return;
  }

  try {

    const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-support-payment-intent", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        amount,
        connectedAccountId: live.creator_stripe_id,
        payment_method_type: "card"
      })
    });

    const data = await res.json();

    const result = await stripe.confirmCardPayment(data.clientSecret, {
      payment_method: { card: cardElement }
    });

    if (result.paymentIntent.status === "succeeded") {

      await supabase.from("supports").insert({
        live_id: liveId,
        user_id: currentUser.id,
        amount: amount
        created_at: new Date().toISOString()
      });

      await supabase.rpc("increment_support", {
        live_id_input: liveId,
        amount_input: amount
      });

      alert("Paiement réussi");
      modal.style.display = "none";
    }

  } catch (err) {
    console.error(err);
    errorBox.textContent = "Erreur paiement";
  }
};

</script>
</body>
</html>
