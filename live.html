<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:system-ui;
  color:white;
}
header{
  height:56px;
  background:#181818;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}
header h2{
  margin:0;
  font-size:18px;
}
.main{
  display:flex;
  gap:16px;
  padding:16px;
  max-width:1400px;
  margin:auto;
}
.video-area{
  flex:2;
}
video{
  width:100%;
  height:70vh;
  background:black;
  border-radius:12px;
}
.live-info{
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}
.chat{
  flex:1;
  background:#181818;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  height:75vh;
}
.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:12px;
}
.msg{
  margin-bottom:10px;
  font-size:14px;
}
.msg span{
  font-weight:600;
}
.chat-input{
  display:flex;
  padding:10px;
  gap:8px;
  border-top:1px solid #333;
}
.chat-input input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#222;
  color:white;
}
.chat-input button{
  background:#ff0000;
  border:none;
  padding:10px 14px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}
/* Soutenir button */
#supportBtn{
  background:#ff9800;
  border:none;
  padding:12px 20px;
  border-radius:25px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}
#supportBtn:hover{
  background:#e68a00;
}
/* Modal */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:100;
}
.modal-content{
  background:#181818;
  padding:20px;
  border-radius:12px;
  max-width:400px;
  width:90%;
}
.modal h3{
  margin-top:0;
  color:#ff9800;
}
.modal label{
  display:block;
  margin:10px 0 5px;
}
.modal input, .modal select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
  margin-bottom:10px;
}
.modal button{
  margin-top:15px;
  background:#ff9800;
  color:black;
  border:none;
  padding:12px;
  width:100%;
  font-weight:700;
  border-radius:20px;
  cursor:pointer;
}
.modal button:hover{
  background:#e68a00;
}
</style>
</head>
<body>

<header>
  <h2 id="liveTitle">🔴 Live</h2>
  <div id="viewerCount">0 spectateurs</div>
</header>

<div class="main">
  <div class="video-area">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="live-info">
      Chaîne : <span id="channelName"></span>
    </div>
    <button id="supportBtn">💛 Soutenir ce live</button>
  </div>

  <div class="chat">
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input id="msgInput" placeholder="Écrire un message...">
      <button id="sendBtn">
        <i class="fa fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>

<!-- Modal Soutenir -->
<div class="modal" id="supportModal">
  <div class="modal-content">
    <h3>Soutenir le créateur</h3>
    <label>Montant ($)</label>
    <input type="number" id="supportAmount" min="1" value="5">

    <!-- Nouvelle sélection pour méthode de paiement -->
    <label>Méthode de paiement</label>
    <select id="paymentMethod">
      <option value="card">Carte bancaire</option>
      <option value="paypal">PayPal</option>
      <option value="samsung_pay">Samsung Pay</option>
    </select>

    <label>Numéro de carte</label>
    <div id="card-element"></div>

    <button id="payBtn">Payer</button>
    <div id="supportError" style="color:#ff5555;margin-top:8px;"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase,ref,set,onValue,push,remove,get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig={
 apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain: "lumio-822f0.firebaseapp.com",
  databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId: "lumio-822f0",
  storageBucket: "lumio-822f0.firebasestorage.app",
  messagingSenderId: "833325770824",
  appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

const params=new URLSearchParams(location.search);
const liveId=params.get("id");
if(!liveId) location.href="index.html";

let currentUser=null;
let creatorStripeId=null;

onAuthStateChanged(auth,async u=>{
 currentUser=u;

 // Ajouter viewer
 const viewerRef=ref(db,`liveViewers/${liveId}/${u?.uid||("guest_"+Date.now())}`);
 await set(viewerRef,true);
 window.addEventListener("beforeunload",()=>{ remove(viewerRef); });

 // Récupérer info live et créateur
 const snap=await get(ref(db,`lives/${liveId}`));
 if(!snap.exists()) return alert("Live introuvable"),location.href="index.html";
 const l=snap.val();
 document.getElementById("liveTitle").textContent="🔴 "+l.title;
 document.getElementById("channelName").textContent=l.channelName;
 creatorStripeId = l.creatorStripeId;
});

// Chat simple
onValue(ref(db,`liveChat/${liveId}`),snap=>{
 const messages=document.getElementById("messages");
 messages.innerHTML="";
 snap.forEach(m=>{
   const div=document.createElement("div");
   div.className="msg";
   div.innerHTML=`<span>${m.val().user}</span>: ${m.val().text}`;
   messages.appendChild(div);
 });
 messages.scrollTop=messages.scrollHeight;
});

const sendBtn=document.getElementById("sendBtn");
const msgInput=document.getElementById("msgInput");
sendBtn.onclick=async()=>{
 const text=msgInput.value.trim();
 if(!text) return;
 msgInput.value="";
 await push(ref(db,`liveChat/${liveId}`),{
   user:currentUser?.displayName||"Invité",
   text,
   uid:currentUser?.uid||null,
   createdAt:Date.now()
 });
};

// 🔹 Modal Soutenir
const supportBtn=document.getElementById("supportBtn");
const modal=document.getElementById("supportModal");
const payBtn=document.getElementById("payBtn");
const amountInput=document.getElementById("supportAmount");
const errorBox=document.getElementById("supportError");
const paymentMethodSelect=document.getElementById("paymentMethod");

supportBtn.onclick=()=>{ modal.style.display="flex"; };
window.onclick=(e)=>{ if(e.target===modal) modal.style.display="none"; };

// Stripe Elements
const stripeJs = await import("https://js.stripe.com/v3/index.js");
const stripe = Stripe("pk_test_51T5dLtDvG1O1eTGy2yb8ADAX15shxntgDaS31pjExCuVEDoAfc4O3Fet70rVdM7az2HhAcv3qrr4WQF2m0QDgoJW00rtDoDjdA");
const elements = stripe.elements();
const cardElement = elements.create("card");
cardElement.mount("#card-element");

payBtn.onclick=async()=>{
  errorBox.textContent="";
  const amount = parseFloat(amountInput.value);
  if(!amount || amount<1) return errorBox.textContent="Montant invalide";

  const selectedMethod = paymentMethodSelect.value;
  let cpmtId = null;
  if(selectedMethod==="paypal") cpmtId="cpmt_1T7nejDvG1O1eTGy9EdAUq9L";
  else if(selectedMethod==="samsung_pay") cpmtId="cpmt_1T7nfEDvG1O1eTGypbG4QJn3";

  try{
    const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/create-support-payment-intent",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        amount,
        connectedAccountId: creatorStripeId,
        payment_method_type: selectedMethod==="card"?"card":cpmtId
      })
    });
    const data = await res.json();
    if(data.error) return errorBox.textContent=data.message||data.error;

    if(selectedMethod==="card"){
      const { clientSecret } = data;
      const result = await stripe.confirmCardPayment(clientSecret, {
        payment_method:{ card: cardElement }
      });
      if(result.paymentIntent && result.paymentIntent.status==="succeeded"){

  alert("Paiement réussi ! Merci pour votre soutien 💛");
  modal.style.display="none";

  try{

    const liveSnap = await get(ref(db, `lives/${liveId}`));
    const liveData = liveSnap.val();

    const creatorUid = liveData.creatorUid || null;

    // 1️⃣ enregistrer le soutien
    await push(ref(db,"supports"),{
      liveId: liveId,
      userEmail: currentUser?.email || "guest",
      amount: amount,
      creatorUid: creatorUid,
      timestamp: Date.now()
    });

    // 2️⃣ mettre à jour totalSupport du live
    const currentTotal = liveData.totalSupport || 0;

    await set(ref(db,`lives/${liveId}/totalSupport`), currentTotal + amount);

  }catch(err){
    console.error("Erreur enregistrement soutien",err);
  }

}
    } else {
      // Pour PayPal et Samsung Pay, redirection Stripe Checkout
      window.location.href = data.checkout_url;
    }

  } catch(err){
    console.error(err);
    errorBox.textContent="Erreur paiement";
  }
};
</script>
</body>
</html>
