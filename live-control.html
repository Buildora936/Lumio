<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Live Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:system-ui;
  color:white;
}

header{
  height:60px;
  background:#181818;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

header h2{ margin:0; }

.stats-bar{
  display:flex;
  gap:20px;
  font-size:14px;
  color:#aaa;
}

.main{
  display:flex;
  gap:16px;
  padding:16px;
  height:calc(100vh - 60px);
}

.preview{
  flex:2;
  display:flex;
  flex-direction:column;
}

video{
  width:100%;
  height:70vh;
  background:black;
  border-radius:12px;
}

.controls{
  margin-top:12px;
  display:flex;
  gap:10px;
}

.controls button{
  background:#222;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

.controls button.active{
  background:#ff0000;
}

.chat{
  flex:1;
  background:#181818;
  border-radius:12px;
  display:flex;
  flex-direction:column;
}

.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:12px;
}

.msg{ margin-bottom:10px; }

.chat-input{
  display:flex;
  padding:10px;
  gap:6px;
  border-top:1px solid #333;
}

.chat-input input{
  flex:1;
  padding:8px;
  border:none;
  border-radius:20px;
  background:#222;
  color:white;
}

.chat-input button{
  background:#ff0000;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

.ban{
  color:red;
  cursor:pointer;
  margin-left:6px;
}
 #topSupportersBox{
  margin-top:20px;
  background:#181818;
  padding:12px;
  border-radius:10px;
}

#topSupporters div{
  margin:6px 0;
  font-weight:600;
}
</style>
</head>

<body>

<header>
  <h2>🔴 Lumio Live Studio</h2>
  <div class="stats-bar">
    <span id="viewerCount">0 spectateurs</span>
    <span id="totalEarned">Gagné: $0</span>
  </div>
 <div id="topSupportersBox">
  <h3>🏆 Top supporters</h3>
  <div id="topSupporters"></div>
</div>
  <button onclick="endLive()">Terminer le live</button>
</header>

<div class="main">

  <div class="preview">
    <video id="localVideo" autoplay muted playsinline></video>

    <div class="controls">
      <button id="camBtn">Caméra</button>
      <button id="screenBtn">Écran</button>
      <button id="bothBtn">Cam + Écran</button>
    </div>
  </div>

  <div class="chat">
    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
      <input id="msgInput" placeholder="Message...">
      <button id="sendBtn">Envoyer</button>
    </div>
  </div>

</div>

 <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase,ref,set,onValue,push,get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

/* ================= INIT ================= */

const firebaseConfig={
 apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
 authDomain:"lumio-822f0.firebaseapp.com",
 databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
 projectId:"lumio-822f0",
 storageBucket:"lumio-822f0.firebasestorage.app",
 messagingSenderId:"833325770824",
 appId:"1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

const params=new URLSearchParams(location.search);
const liveId=params.get("id");
if(!liveId) location.href="index.html";

/* ================= STATE ================= */

let currentUser=null;
let localStream=null;
let peerConnections={};

/* ================= DOM ================= */

const localVideo=document.getElementById("localVideo");
const viewerCountEl=document.getElementById("viewerCount");

/* ================= AUTH ================= */

onAuthStateChanged(auth,u=>{
 if(!u){
   location.href="auth.html";
   return;
 }
 currentUser=u;
});

/* ================= STREAM ================= */

async function startCamera(){
 localStream=await navigator.mediaDevices.getUserMedia({
   video:true,
   audio:true
 });
 localVideo.srcObject=localStream;
}

async function startScreen(){
 const screen=await navigator.mediaDevices.getDisplayMedia({video:true});
 const mic=await navigator.mediaDevices.getUserMedia({audio:true});

 screen.addTrack(mic.getAudioTracks()[0]);

 localStream=screen;
 localVideo.srcObject=localStream;
}

camBtn.onclick=startCamera;
screenBtn.onclick=startScreen;

/* ================= WEBRTC ================= */

const iceServers={
 iceServers:[{urls:"stun:stun.l.google.com:19302"}]
};

async function createConnection(viewerId){

 const pc=new RTCPeerConnection(iceServers);

 localStream.getTracks().forEach(track=>{
   pc.addTrack(track,localStream);
 });

 pc.onicecandidate=(e)=>{
   if(e.candidate){
     push(ref(db,`liveSignals/${liveId}/ice/${viewerId}`), e.candidate.toJSON());
   }
 };

 pc.onconnectionstatechange=()=>{
   if(pc.connectionState==="disconnected" || pc.connectionState==="failed"){
     delete peerConnections[viewerId];
   }
 };

 peerConnections[viewerId]=pc;

 return pc;
}

/* ================= VIEWERS ================= */

onValue(ref(db,`liveViewers/${liveId}`),snap=>{
 const viewers=snap.val()||{};
 viewerCountEl.textContent=Object.keys(viewers).length+" spectateurs";

 Object.keys(viewers).forEach(async uid=>{

   if(peerConnections[uid]) return;
   if(!localStream) return;

   const pc=await createConnection(uid);

   const offer=await pc.createOffer();
   await pc.setLocalDescription(offer);

   await set(ref(db,`liveSignals/${liveId}/offers/${uid}`), offer);
 });

});

/* ================= ANSWERS ================= */

onValue(ref(db,`liveSignals/${liveId}/answers`),snap=>{

 snap.forEach(viewerSnap=>{
   const viewerId=viewerSnap.key;
   const answer=viewerSnap.val();

   const pc=peerConnections[viewerId];
   if(!pc) return;

   if(!pc.currentRemoteDescription){
     pc.setRemoteDescription(new RTCSessionDescription(answer));
   }
 });

});

/* ================= ICE ================= */

onValue(ref(db,`liveSignals/${liveId}/ice`),snap=>{

 snap.forEach(viewerSnap=>{
   const viewerId=viewerSnap.key;
   const pc=peerConnections[viewerId];
   if(!pc) return;

   viewerSnap.forEach(c=>{
     try{
       pc.addIceCandidate(new RTCIceCandidate(c.val()));
     }catch(e){}
   });
 });

});

/* ================= END LIVE ================= */

window.endLive=async()=>{
 await set(ref(db,`lives/${liveId}/status`),"ended");

 Object.values(peerConnections).forEach(pc=>{
   try{ pc.close(); }catch(e){}
 });

 localStream?.getTracks().forEach(t=>t.stop());

 alert("Live terminé");
 location.href="index.html";
};
</script>

</body>
</html>
