<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lumio Live Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
  margin:0;
  background:#0f0f0f;
  font-family:system-ui;
  color:white;
}

header{
  height:60px;
  background:#181818;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

header h2{ margin:0; }

.stats-bar{
  display:flex;
  gap:20px;
  font-size:14px;
  color:#aaa;
}

.main{
  display:flex;
  gap:16px;
  padding:16px;
  height:calc(100vh - 60px);
}

.preview{
  flex:2;
  display:flex;
  flex-direction:column;
}

video{
  width:100%;
  height:70vh;
  background:black;
  border-radius:12px;
}

.controls{
  margin-top:12px;
  display:flex;
  gap:10px;
}

.controls button{
  background:#222;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

.controls button.active{
  background:#ff0000;
}

.chat{
  flex:1;
  background:#181818;
  border-radius:12px;
  display:flex;
  flex-direction:column;
}

.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:12px;
}

.msg{ margin-bottom:10px; }

.chat-input{
  display:flex;
  padding:10px;
  gap:6px;
  border-top:1px solid #333;
}

.chat-input input{
  flex:1;
  padding:8px;
  border:none;
  border-radius:20px;
  background:#222;
  color:white;
}

.chat-input button{
  background:#ff0000;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

.ban{
  color:red;
  cursor:pointer;
  margin-left:6px;
}
 #topSupportersBox{
  margin-top:20px;
  background:#181818;
  padding:12px;
  border-radius:10px;
}

#topSupporters div{
  margin:6px 0;
  font-weight:600;
}
</style>
</head>

<body>

<header>
  <h2>🔴 Lumio Live Studio</h2>
  <div class="stats-bar">
    <span id="viewerCount">0 spectateurs</span>
    <span id="totalEarned">Gagné: $0</span>
  </div>
 <div id="topSupportersBox">
  <h3>🏆 Top supporters</h3>
  <div id="topSupporters"></div>
</div>
  <button onclick="endLive()">Terminer le live</button>
</header>

<div class="main">

  <div class="preview">
    <video id="localVideo" autoplay muted playsinline></video>

    <div class="controls">
      <button id="camBtn">Caméra</button>
      <button id="screenBtn">Écran</button>
      <button id="bothBtn">Cam + Écran</button>
    </div>
  </div>

  <div class="chat">
    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
      <input id="msgInput" placeholder="Message...">
      <button id="sendBtn">Envoyer</button>
    </div>
  </div>

</div>

<script type="module">

import { Room } from "https://cdn.skypack.dev/livekit-client";
import { supabase } from "./supabase.js";

/* ================= PARAMS ================= */

const params = new URLSearchParams(location.search);
const liveId = params.get("id");
if (!liveId) location.href = "index.html";

/* ================= DOM ================= */

const video = document.getElementById("localVideo");
const viewersEl = document.getElementById("viewerCount");
const earnedEl = document.getElementById("totalEarned");
const topBox = document.getElementById("topSupporters");
const chatBox = document.getElementById("messages");

/* ================= STATE ================= */

let currentUser = null;
let localStream = null;
let room = null;
let lastMessageTime = 0;

/* ================= AUTH ================= */

const { data: { user } } = await supabase.auth.getUser();

if (!user) location.href = "login.html";

currentUser = user;

/* ================= LIVE STATUS ================= */

async function setLiveStatus(status){

  const { data, error } = await supabase
    .from("lives")
    .update({ status })
    .eq("id", liveId)
    .select();

  console.log("STATUS UPDATE RESULT:", data, error);

  if(error){
    alert("Erreur status: " + error.message);
  }
}
/* ================= LIVEKIT CONNECT ================= */

async function connectLiveKit(stream){

  const roomName = liveId;

  const res = await fetch("https://ymcrkbcsuloijemdbqzy.supabase.co/functions/v1/livekit-token", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      room: roomName,
      user: currentUser.id,
      isCreator: true
    })
  });

  const { token } = await res.json();

  room = new Room();

  await room.connect(
    "wss://lumio-streaming-2k1h55ws.livekit.cloud",
    token
  );

  // 🔥 publier caméra/audio
  for (const track of stream.getTracks()) {
    await room.localParticipant.publishTrack(track);
  }

}

/* ================= STREAM ================= */

async function startCamera(){

  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  video.srcObject = localStream;

  await connectLiveKit(localStream);

  await setLiveStatus("live");
}

async function startScreen(){

  const screen = await navigator.mediaDevices.getDisplayMedia({ video:true });
  const mic = await navigator.mediaDevices.getUserMedia({ audio:true });

  screen.addTrack(mic.getAudioTracks()[0]);
  localStream = screen;

  video.srcObject = localStream;

  await connectLiveKit(localStream);

  await setLiveStatus("live");
}

camBtn.onclick = startCamera;
screenBtn.onclick = startScreen;

/* ================= PRESENCE ================= */

const presenceChannel = supabase.channel("live_" + liveId, {
  config:{
    presence:{ key: currentUser.id }
  }
});

presenceChannel.on("presence",{ event:"sync" },()=>{

  const state = presenceChannel.presenceState();
  const count = Object.keys(state).length;

  viewersEl.textContent = count + " spectateurs";

  supabase.from("lives")
    .update({ viewers: count })
    .eq("id", liveId);

});

await presenceChannel.subscribe(async (status)=>{
  if(status==="SUBSCRIBED"){
    await presenceChannel.track({
      user_id: currentUser.id,
      joined_at: Date.now()
    });
  }
});

/* ================= GAINS ================= */

const supportsChannel = supabase.channel("supports_" + liveId);

supportsChannel.on(
  "postgres_changes",
  {
    event:"*",
    schema:"public",
    table:"supports",
    filter:`live_id=eq.${liveId}`
  },
  ()=> loadSupports()
);

supportsChannel.subscribe();

async function loadSupports(){

  const { data } = await supabase
    .from("supports")
    .select("user_id, amount")
    .eq("live_id", liveId);

  let total = 0;
  const supporters = {};

  data.forEach(s=>{
    total += Number(s.amount);
    supporters[s.user_id] =
      (supporters[s.user_id] || 0) + Number(s.amount);
  });

  earnedEl.textContent = "💰 $" + total.toFixed(2);

  const sorted = Object.entries(supporters)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3);

  topBox.innerHTML = "";

  const medals = ["🥇","🥈","🥉"];

  sorted.forEach((s,i)=>{
    const div = document.createElement("div");
    div.textContent = `${medals[i]} ${s[0]} — $${s[1]}`;
    topBox.appendChild(div);
  });
}

loadSupports();

/* ================= CHAT ================= */

const chatChannel = supabase.channel("chat_" + liveId);

chatChannel.on(
  "postgres_changes",
  {
    event:"INSERT",
    schema:"public",
    table:"chat_messages",
    filter:`live_id=eq.${liveId}`
  },
  (payload)=>{

    const m = payload.new;

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <b>${m.user_name}</b>: ${m.message}
      <span class="ban" onclick="ban('${m.user_id}')">Ban</span>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
);

chatChannel.subscribe();

/* ================= SEND MESSAGE ================= */

sendBtn.onclick = async ()=>{

  const now = Date.now();

  if(now - lastMessageTime < 1000){
    alert("Trop rapide");
    return;
  }

  const text = msgInput.value.trim();
  if(!text) return;

  msgInput.value="";
  lastMessageTime = now;

  await supabase.from("chat_messages").insert({
    live_id: liveId,
    user_id: currentUser.id,
    user_name: currentUser.user_metadata?.name || "Créateur",
    message: text,
    created_at: new Date().toISOString()
  });
};

/* ================= BAN ================= */

window.ban = async (uid)=>{
  await supabase.from("bans").insert({
    live_id: liveId,
    user_id: uid
  });
};

/* ================= END LIVE ================= */

window.endLive = async ()=>{

  await setLiveStatus("ended");

  localStream?.getTracks().forEach(t=>t.stop());

  if(room){
    await room.disconnect();
  }

  await presenceChannel.unsubscribe();

  alert("Live terminé");
  location.href="index.html";
};

</script>
</body>
</html>
