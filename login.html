<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* CARD */
.container{
  width:100%;
  max-width:380px;
  background:#181818;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  animation:fadeIn .6s ease;
}

/* TITLE */
h2{
  margin:0 0 20px;
  text-align:center;
}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
  outline:none;
  transition:0.2s;
}

input:focus{
  background:#2a2a2a;
  box-shadow:0 0 0 2px #ff0000;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#ff0000;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#ff1f1f;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

/* STATES */
.error{
  color:#ff4d4d;
  font-size:14px;
  margin-bottom:10px;
}

.success{
  color:#00ffae;
  font-size:14px;
  margin-bottom:10px;
}

.info{
  color:#aaa;
  font-size:13px;
  margin-top:10px;
  text-align:center;
}

/* LOADER */
.loader{
  width:18px;
  height:18px;
  border:2px solid #fff;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:inline-block;
}

/* ANIMATIONS */
@keyframes spin{
  to{transform:rotate(360deg);}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h2>Connexion</h2>

  <form id="form">

    <div class="input-group">
      <input id="email" type="email" placeholder="Email" required>
    </div>

    <div class="input-group">
      <input id="password" type="password" placeholder="Mot de passe" required>
    </div>

    <div id="message"></div>

    <button id="loginBtn" type="submit">
      Se connecter
    </button>

  </form>

  <div class="info">
    🔒 Connexion sécurisée • Lumio protège vos données
  </div>
</div>

<script type="module">

import { login } from "./login.js";
import { supabase } from "./supabase.js";

const form = document.getElementById("form");
const btn = document.getElementById("loginBtn");
const message = document.getElementById("message");

form.onsubmit = async (e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  message.innerHTML="";
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span>`;

  try{

    const user = await login(email, password);

    if(!user){
      message.innerHTML = `<div class="error">Email ou mot de passe incorrect</div>`;
      btn.disabled = false;
      btn.textContent = "Se connecter";
      return;
    }

    message.innerHTML = `<div class="success">Connexion réussie</div>`;

    // 🔥 Vérifier si user a un channel
    const { data: channel } = await supabase
      .from("channels")
      .select("*")
      .eq("user_id", user.id)
      .single();

    setTimeout(()=>{
      if(channel){
        location.href = "index.html";
      }else{
        location.href = "add-channel.html";
      }
    },800);

  }catch(err){
    console.error(err);
    message.innerHTML = `<div class="error">Erreur connexion</div>`;
    btn.disabled = false;
    btn.textContent = "Se connecter";
  }
};

</script>

</body>
</html>
