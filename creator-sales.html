<!DOCTYPE html>
<html>
<head>

<title>Creator Sales</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:30px;
}

.stat{
background:#1c1c1c;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
}

.stat h2{
margin:0;
font-size:32px;
}

section{
margin-top:40px;
}

canvas{
background:#1c1c1c;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<h1>Creator Dashboard</h1>

<div class="stats">

<div class="stat">
<p>Total Revenue</p>
<h2 id="revenue">$0</h2>
</div>

<div class="stat">
<p>Total Sales</p>
<h2 id="sales">0</h2>
</div>

<div class="stat">
<p>Products Sold</p>
<h2 id="products">0</h2>
</div>

</div>

<section>
<h3>Revenue Over Time</h3>
<canvas id="revenueChart"></canvas>
</section>

<section>
<h3>Top Products</h3>
<canvas id="productChart"></canvas>
</section>

<table>

<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Date</th>
</tr>
</thead>

<tbody id="salesTable"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain:"lumio-822f0.firebaseapp.com",
  databaseURL:"https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId:"lumio-822f0"
});

const db = getDatabase(app);
const auth = getAuth(app);

let uid = null;

const revenueEl = document.getElementById("revenue");
const salesEl = document.getElementById("sales");
const productsEl = document.getElementById("products");
const table = document.getElementById("salesTable");

let revenueChart;
let productChart;

/* =========================
   AUTH
========================= */

onAuthStateChanged(auth, async (user)=>{

if(!user) return location.href="auth.html";

uid = user.uid;

await loadDashboard();

});

/* =========================
   DASHBOARD
========================= */

async function loadDashboard(){

const snap = await get(ref(db,"purchases"));

if(!snap.exists()) return;

const data = snap.val();

let revenue = 0;
let sales = 0;
let productSet = new Set();

const revenueByDay = {};
const productCount = {};

table.innerHTML = "";

for(const userId in data){

for(const productId in data[userId]){

const purchase = data[userId][productId];

const productSnap = await get(ref(db,"arts/"+productId));

if(!productSnap.exists()) continue;

const product = productSnap.val();

/* FILTER CREATOR */
if(product.creatorChannelId !== uid) continue;

sales++;
productSet.add(productId);

const creatorShare = product.price * 0.85;
revenue += creatorShare;

/* =========================
   DATE ANALYTICS
========================= */

const date = new Date(purchase.date || Date.now()).toLocaleDateString();

revenueByDay[date] = (revenueByDay[date] || 0) + creatorShare;

/* TOP PRODUCTS */
productCount[product.title] = (productCount[product.title] || 0) + 1;

/* TABLE */
const row = document.createElement("tr");
row.innerHTML = `
<td>${product.title}</td>
<td>$${product.price}</td>
<td>${date}</td>
`;
table.appendChild(row);

}

}

/* =========================
   STATS
========================= */

revenueEl.innerText = "$" + revenue.toFixed(2);
salesEl.innerText = sales;
productsEl.innerText = productSet.size;

/* =========================
   CHART 1 - REVENUE OVER TIME
========================= */

const labels = Object.keys(revenueByDay);
const revenueData = Object.values(revenueByDay);

if(revenueChart) revenueChart.destroy();

revenueChart = new Chart(
document.getElementById("revenueChart"),
{
type:"line",
data:{
labels,
datasets:[{
label:"Revenue ($)",
data:revenueData,
borderColor:"#ff6a00"
}]
}
}
);

/* =========================
   CHART 2 - TOP PRODUCTS
========================= */

const topProducts = Object.entries(productCount)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);

const productLabels = topProducts.map(p=>p[0]);
const productData = topProducts.map(p=>p[1]);

if(productChart) productChart.destroy();

productChart = new Chart(
document.getElementById("productChart"),
{
type:"bar",
data:{
labels:productLabels,
datasets:[{
label:"Sales",
data:productData,
backgroundColor:"#ff6a00"
}]
}
}
);

}

</script>

</body>
</html>
