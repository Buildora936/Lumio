<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Monétisation – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain: "lumio-822f0.firebaseapp.com",
  databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId: "lumio-822f0",
  storageBucket: "lumio-822f0.firebasestorage.app",
  messagingSenderId: "833325770824",
  appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let channelId = null;

// Elements
const subsElem = document.getElementById("subs");
const ageElem = document.getElementById("age");
const blockedElem = document.getElementById("blocked");
const panelElem = document.getElementById("panel");
const monetizationBtn = document.getElementById("monetizationBtn");
const ads = document.getElementById("ads");
const donations = document.getElementById("donations");

onAuthStateChanged(auth, async user => {
  if (!user) return location.href = "auth.html";

  // Récupérer le channel
  const chSnap = await get(ref(db, "userChannels/" + user.uid));
  if (!chSnap.exists()) {
    alert("Créez une chaîne d'abord");
    return location.href = "add-channel.html";
  }
  channelId = chSnap.val();

  // Vérifier abonnés
  const subSnap = await get(ref(db, "subscriptions/" + channelId));
  const subs = subSnap.exists() ? Object.keys(subSnap.val()).length : 0;
  subsElem.textContent = subs;

  // Vérifier âge du créateur
  const ageSnap = await get(ref(db, "users/" + user.uid + "/age"));
  const age = ageSnap.exists() ? ageSnap.val() : 0;
  ageElem.textContent = age;

  // Bloquer si conditions non remplies
  if (subs < 10000 || age < 18) {
    blockedElem.style.display = "block";
    panelElem.style.display = "none";
    return;
  }

  blockedElem.style.display = "none";
  panelElem.style.display = "block";

  // Charger config existante
  const mSnap = await get(ref(db, "monetization/" + channelId));
  let enabled = false;
  if (mSnap.exists()) {
    const m = mSnap.val();
    enabled = m.enabled;
    ads.checked = m.ads;
    donations.checked = m.donations;
  }
  monetizationBtn.textContent = enabled ? "Désactiver la monétisation" : "Activer la monétisation";

  monetizationBtn.onclick = async () => {
    enabled = !enabled;
    await set(ref(db, "monetization/" + channelId), {
      enabled: enabled,
      ads: ads.checked,
      donations: donations.checked,
      live: false,
      createdAt: Date.now()
    });
    monetizationBtn.textContent = enabled ? "Désactiver la monétisation" : "Activer la monétisation";
    alert(`Monétisation ${enabled ? "activée ✅" : "désactivée ❌"}`);
  };
});
</script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#181818;
  color:white;
}
header{
  height:56px;
  background:#0f0f0f;
  display:flex;
  align-items:center;
  padding:0 16px;
}
header h3{
  margin-left:12px;
}
main{
  max-width:700px;
  margin:24px auto;
  padding:16px;
}
.box{
  background:#202020;
  border-radius:14px;
  padding:20px;
}
.option{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:14px 0;
}
button{
  width:100%;
  margin-top:20px;
  padding:14px;
  background:#ff6a00;
  border:none;
  border-radius:20px;
  font-weight:700;
  cursor:pointer;
}
.notice{
  background:#2a2a2a;
  padding:14px;
  border-radius:14px;
  margin-bottom:16px;
  font-size:14px;
}
.blocked{
  background:#331111;
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
  <h3>Monétisation</h3>
</header>

<main>

  <div class="notice">
    👥 Abonnés : <b id="subs">0</b> / 10 000 requis<br>
    🎂 Âge : <b id="age">0</b> / 18 requis
  </div>

  <div id="blocked" class="blocked">
    ❌ Vous devez avoir au moins <b>10 000 abonnés</b> et être âgé de <b>18 ans</b> pour activer la monétisation.
  </div>

  <div id="panel" class="box">
    <h3>Options disponibles</h3>

    <div class="option">
      <span>🟠 Publicité légère (5s max)</span>
      <input type="checkbox" id="ads">
    </div>

    <div class="option">
      <span>🔵 Dons / Soutien ❤️</span>
      <input type="checkbox" id="donations">
    </div>

    <button id="monetizationBtn">Activer la monétisation</button>
  </div>

</main>

</body>
</html>
