<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Monétisation – Lumio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain: "lumio-822f0.firebaseapp.com",
  databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId: "lumio-822f0",
  storageBucket: "lumio-822f0.firebasestorage.app",
  messagingSenderId: "833325770824",
  appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let channelId = null;

// Elements
const subsElem = document.getElementById("subs");
const blockedElem = document.getElementById("blocked");
const panelElem = document.getElementById("panel");
const ads = document.getElementById("ads");
const donations = document.getElementById("donations");
const saveBtn = document.getElementById("saveBtn");
const certBtn = document.getElementById("certBtn");

onAuthStateChanged(auth, async user => {
  if (!user) return location.href = "auth.html";

  // Récupérer le channel
  const chSnap = await get(ref(db, "userChannels/" + user.uid));
  if (!chSnap.exists()) {
    alert("Créez une chaîne d'abord");
    return location.href = "add-channel.html";
  }
  channelId = chSnap.val();

  // Vérifier abonnés
  const subSnap = await get(ref(db, "subscriptions/" + channelId));
  const subs = subSnap.exists() ? Object.keys(subSnap.val()).length : 0;
  subsElem.textContent = subs;

  if (subs < 1000) {
    blockedElem.style.display = "block";
    panelElem.style.display = "none";
    certBtn.style.display = "none";
    return;
  }

  // Débloquer monétisation et certificat
  blockedElem.style.display = "none";
  panelElem.style.display = "block";
  certBtn.style.display = "block";

  // Charger config existante
  const mSnap = await get(ref(db, "monetization/" + channelId));
  if (mSnap.exists()) {
    const m = mSnap.val();
    ads.checked = m.ads;
    donations.checked = m.donations;
  }
});

// Sauvegarder les options
saveBtn.onclick = async () => {
  if (!channelId) return;
  await set(ref(db, "monetization/" + channelId), {
    enabled: true,
    ads: ads.checked,
    donations: donations.checked,
    live: false,
    createdAt: Date.now()
  });
  alert("Monétisation enregistrée ✅");
};

// Bouton certificat
certBtn.onclick = () => {
  const message = encodeURIComponent(
    "Bonjour Lumio, je souhaite recevoir mon certificat pour avoir atteint 1000 abonnés sur ma chaîne. 🎉"
  );
  window.open(`https://wa.me/50941040511?text=${message}`, "_blank");
};
</script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#181818;
  color:white;
}
header{
  height:56px;
  background:#0f0f0f;
  display:flex;
  align-items:center;
  padding:0 16px;
}
header h3{
  margin-left:12px;
}
main{
  max-width:700px;
  margin:24px auto;
  padding:16px;
}
.box{
  background:#202020;
  border-radius:14px;
  padding:20px;
}
.option{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:14px 0;
}
button{
  width:100%;
  margin-top:20px;
  padding:14px;
  background:#ff6a00;
  border:none;
  border-radius:20px;
  font-weight:700;
  cursor:pointer;
}
.notice{
  background:#2a2a2a;
  padding:14px;
  border-radius:14px;
  margin-bottom:16px;
  font-size:14px;
}
.blocked{
  background:#331111;
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
}
#certBtn{
  display:none;
  background:#1a73e8;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
  <h3>Monétisation</h3>
</header>

<main>

  <div class="notice">
    👥 Abonnés actuels : <b id="subs">0</b> / 1000 requis
  </div>

  <div id="blocked" class="blocked">
    ❌ Vous devez atteindre <b>1000 abonnés</b> pour activer la monétisation.
  </div>

  <div id="panel" class="box">
    <h3>Options disponibles</h3>

    <div class="option">
      <span>🟠 Publicité légère (5s max)</span>
      <input type="checkbox" id="ads">
    </div>

    <div class="option">
      <span>🔵 Dons / Soutien ❤️</span>
      <input type="checkbox" id="donations">
    </div>

    <button id="saveBtn">Enregistrer la monétisation</button>

    <button id="certBtn">Demander un certificat 🎓</button>
  </div>

</main>

</body>
</html>
