<!DOCTYPE html>
<html>
<head>

<title>My Library</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:8px;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
}

</style>

</head>
<body>

<h1>My Library</h1>

<div id="library" class="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"

const firebaseConfig = {

apiKey: "AIzaSyAZPXNlfQ4ukMIZGP2faczlDxLvqGJc8c8",
  authDomain: "lumio-822f0.firebaseapp.com",
  databaseURL: "https://lumio-822f0-default-rtdb.firebaseio.com",
  projectId: "lumio-822f0",
  storageBucket: "lumio-822f0.firebasestorage.app",
  messagingSenderId: "833325770824",
  appId: "1:833325770824:web:b1a87a7bda0b00ee20907d"

}

const app = initializeApp(firebaseConfig)

const auth = getAuth(app)
const db = getDatabase(app)

const container = document.getElementById("library")

/* ---------- render ---------- */

function render(products){

container.innerHTML=""

products.forEach(product=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${product.cover}">

<h3>${product.title}</h3>

<button onclick="download('${product.downloadURL}')">
Download
</button>

`

container.appendChild(card)

})

}

/* ---------- download ---------- */

window.download=(url)=>{

window.open(url,"_blank")

}

/* ---------- cache ---------- */

function saveCache(data){

localStorage.setItem(
"lumio_library",
JSON.stringify(data)
)

}

function loadCache(){

const data=localStorage.getItem("lumio_library")

if(!data) return null

return JSON.parse(data)

}

/* ---------- auth ---------- */

onAuthStateChanged(auth, async(user)=>{

if(!user) return

const uid=user.uid

/* 1️⃣ charger cache */

const cache=loadCache()

if(cache){

render(cache)

}

/* 2️⃣ charger firebase */

const snapshot=await get(
ref(db,"userLibrary/"+uid)
)

if(!snapshot.exists()) return

const data=snapshot.val()

const products=Object.values(data)

/* 3️⃣ render */

render(products)

/* 4️⃣ sauver cache */

saveCache(products)

})

</script>

</body>
</html>
